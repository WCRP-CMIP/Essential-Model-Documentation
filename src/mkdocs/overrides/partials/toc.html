<!-- Right sidebar with controls and TOC -->
<div class="md-sidebar md-sidebar--secondary" data-md-component="sidebar" data-md-type="toc">
  <div class="md-sidebar__scrollwrap">
    <div class="md-sidebar__inner">
      
      <!-- Controls: Search, GitHub, Dark mode toggle -->
      <div class="sidebar-controls">
        <!-- Search -->
        <div class="sidebar-search">
          {% include "partials/search.html" %}
        </div>
        
        <!-- GitHub and Toggle row -->
        <div class="sidebar-actions">
          <!-- GitHub link -->
          {% if config.repo_url %}
          <a href="{{ config.repo_url }}" title="{{ config.repo_name }}" class="sidebar-action-btn sidebar-github">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18">
              <path fill="currentColor" d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
            </svg>
          </a>
          {% endif %}
          
          <!-- Dark mode toggle -->
          <label class="sidebar-action-btn sidebar-toggle" for="__palette_1">
            <div class="toggle-track">
              <div class="toggle-thumb"></div>
            </div>
          </label>
        </div>
      </div>
      
      <!-- Table of contents -->
      {% if page.toc %}
      <nav class="md-nav md-nav--secondary" aria-label="{{ lang.t('toc.title') }}">
        <label class="md-nav__title" for="__toc">
          {{ lang.t("toc.title") }}
        </label>
        <ul class="md-nav__list" data-md-component="toc" data-md-scrollfix>
          {% for toc_item in page.toc %}
            {% include "partials/toc-item.html" %}
          {% endfor %}
        </ul>
      </nav>
      {% endif %}
      
    </div>
  </div>
</div>
