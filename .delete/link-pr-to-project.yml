name: 🔗 Link PR to project board

# GitHub only auto-links PRs to project boards when they target the default branch.
# Our EMD PRs target src-data, so we add them manually via the GraphQL API.

on:
  pull_request:
    types: [opened, reopened]
    branches-ignore:
      - main
      - production
      - docs

permissions:
  contents: read

jobs:
  link_to_project:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.CMIP_IPO_BOT_TOKEN || github.token }}

    steps:
      - name: Add PR to project board
        run: |
          PR_URL="${{ github.event.pull_request.html_url }}"
          REPO_OWNER="${{ github.repository_owner }}"

          echo "Adding $PR_URL to project board..."

          # Find the first open project for this owner that has 'EMD' or 'Essential' in the name,
          # or fall back to PROJECT_NUMBER variable/secret if set.
          PROJECT_NUMBER="${{ vars.PROJECT_NUMBER }}"

          if [ -z "$PROJECT_NUMBER" ]; then
            # Auto-discover: list projects, pick the first one
            PROJECT_NUMBER=$(gh project list --owner "$REPO_OWNER" --format json \
              --jq '[.projects[] | select(.title | test("EMD|Essential|Model|Documentation"; "i"))] | .[0].number // .projects[0].number' \
              2>/dev/null || true)
          fi

          if [ -z "$PROJECT_NUMBER" ] || [ "$PROJECT_NUMBER" = "null" ]; then
            echo "⚠ No project found. Set the PROJECT_NUMBER repository variable to link automatically."
            echo "| Status | Note |" >> "$GITHUB_STEP_SUMMARY"
            echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
            echo "| ⚠ Skipped | Set PROJECT_NUMBER repo variable to enable project linking |" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "Using project #$PROJECT_NUMBER"

          gh project item-add "$PROJECT_NUMBER" \
            --owner "$REPO_OWNER" \
            --url "$PR_URL"

          echo "## ✅ PR linked to project #${PROJECT_NUMBER}" >> "$GITHUB_STEP_SUMMARY"
          echo "PR: $PR_URL" >> "$GITHUB_STEP_SUMMARY"
