name: ⟳ Sync copilot instructions to src-data

# copilot-instructions.md must live on the PR base branch (src-data) for
# GitHub Copilot to read it. This workflow keeps it in sync with main.

on:
  push:
    branches:
      - main
    paths:
      - .github/copilot-instructions.md
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Configure Git
        run: |
          git config user.name  "cmip-ipo"
          git config user.email "actions@wcrp-cmip.org"

      - name: Copy instructions to src-data
        env:
          GH_TOKEN: ${{ secrets.CMIP_IPO_BOT_TOKEN || github.token }}
        run: |
          git fetch origin src-data
          git checkout src-data

          mkdir -p .github
          git checkout main -- .github/copilot-instructions.md

          if git diff --quiet; then
            echo "copilot-instructions.md already up to date on src-data"
            exit 0
          fi

          git add .github/copilot-instructions.md
          git commit -m "Sync copilot-instructions.md from main"
          git push origin src-data
          echo "-> copilot-instructions.md synced to src-data" >> "$GITHUB_STEP_SUMMARY"
