# Custom Links for Navigation
# ============================
#
# Add external links to appear in the left sidebar navigation.
# These links will appear under the "External Links" section.
#
# Format:
#   - title: "Link Text"
#     url: "https://example.com"
#     category: "Category Name"  # Optional - groups links under subcategories
#
# Examples included below - modify or remove as needed.

