<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMD Submission Progress</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  /* ============================================
     THEME — matches custom.css EMD palette
     ============================================ */
  :root {
    --emd-primary: #2196f3;
    --emd-primary-light: #bbdefb;
    --emd-primary-dark: #1976d2;
    --emd-text: #1e293b;
    --emd-text-secondary: #475569;
    --emd-text-tertiary: #94a3b8;
    --emd-bg: #ffffff;
    --emd-bg-secondary: #f8fafc;
    --emd-bg-tertiary: #f1f5f9;
    --emd-border: #e2e8f0;
    --emd-border-light: #f1f5f9;
    --emd-success: #10b981;
    --emd-success-light: #d1fae5;
    --emd-warning: #f59e0b;
    --emd-warning-light: #fef3c7;
    --emd-danger: #ef4444;
    --emd-danger-light: #fee2e2;
    --emd-info: #3b82f6;
    --emd-info-light: #dbeafe;
    --emd-purple: #7c3aed;
    --emd-purple-light: #ede9fe;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
  }

  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: var(--emd-text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1.5rem 1.25rem 3rem;
  }

  /* ============================================
     HERO / SEARCH
     ============================================ */
  .hero {
    text-align: center;
    padding: 3rem 0 2rem;
    transition: padding 0.35s ease;
  }
  .hero.compact { padding: 0.75rem 0 1.25rem; }

  .hero h1 {
    font-size: 2rem;
    font-weight: 700;
    color: var(--emd-text);
    margin: 0 0 0.5rem;
    letter-spacing: -0.02em;
    transition: font-size 0.35s ease;
  }
  .hero.compact h1 {
    font-size: 1.15rem;
    margin-bottom: 0.25rem;
  }

  .hero .subtitle {
    color: var(--emd-text-secondary);
    font-size: 1rem;
    margin: 0 0 1.75rem;
    transition: all 0.35s ease;
  }
  .hero.compact .subtitle {
    font-size: 0.8rem;
    margin-bottom: 0.85rem;
    color: var(--emd-text-tertiary);
  }

  .search-form {
    display: flex;
    gap: 0.5rem;
    max-width: 480px;
    margin: 0 auto;
  }
  .hero.compact .search-form { max-width: 380px; }

  .search-form input {
    flex: 1;
    padding: 0.7rem 1rem;
    font-size: 0.95rem;
    font-family: inherit;
    border: 1px solid var(--emd-border);
    border-radius: 8px;
    background: white;
    color: var(--emd-text);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-form input::placeholder { color: var(--emd-text-tertiary); }
  .search-form input:focus {
    border-color: var(--emd-primary);
    box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.15);
  }
  .hero.compact .search-form input { padding: 0.5rem 0.85rem; font-size: 0.85rem; }

  .search-form button {
    padding: 0.7rem 1.4rem;
    font-size: 0.95rem;
    font-weight: 600;
    font-family: inherit;
    background: var(--emd-primary);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s, transform 0.05s;
  }
  .search-form button:hover { background: var(--emd-primary-dark); }
  .search-form button:active { transform: scale(0.98); }
  .search-form button:disabled {
    background: var(--emd-text-tertiary);
    cursor: not-allowed;
    transform: none;
  }
  .hero.compact .search-form button { padding: 0.5rem 1rem; font-size: 0.85rem; }

  .hero-links {
    margin-top: 1.25rem;
    font-size: 0.85rem;
    color: var(--emd-text-tertiary);
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
  }
  .hero.compact .hero-links { display: none; }

  .hero-links a {
    color: var(--emd-primary);
    text-decoration: none;
    font-weight: 500;
    padding: 0.35rem 0.85rem;
    border: 1px solid var(--emd-border);
    border-radius: 6px;
    background: white;
    transition: all 0.15s;
  }
  .hero-links a:hover {
    border-color: var(--emd-primary);
    background: var(--emd-bg-secondary);
  }
  .hero-links .sep {
    color: var(--emd-text-tertiary);
    opacity: 0.5;
  }

  /* ============================================
     STATUS / ERROR
     ============================================ */
  #status:not(:empty) {
    text-align: center;
    padding: 0.85rem 1rem;
    font-size: 0.9rem;
    color: var(--emd-text-secondary);
    background: var(--emd-bg-secondary);
    border: 1px solid var(--emd-border);
    border-radius: 8px;
    max-width: 480px;
    margin: 0 auto 1.5rem;
  }
  #status.error {
    color: var(--emd-danger);
    background: var(--emd-danger-light);
    border-color: #fca5a5;
  }

  /* Rich (multi-line) error message — used for rate-limit explanation */
  #status.error.rich {
    text-align: left;
    max-width: 640px;
    line-height: 1.5;
  }
  #status.error.rich .rate-limit-msg p {
    margin: 0.6rem 0;
  }
  #status.error.rich .rate-limit-msg ul {
    margin: 0.4rem 0 0.6rem;
    padding-left: 1.4rem;
  }
  #status.error.rich .rate-limit-msg li {
    margin: 0.25rem 0;
  }
  #status.error.rich .rate-limit-msg a {
    color: var(--emd-danger);
    font-weight: 600;
  }
  #status.error.rich .reset-time {
    font-size: 0.8rem;
    color: var(--emd-text-secondary);
    margin-top: 0.85rem;
    font-style: italic;
  }

  /* Quiet 'cached data' notice — sits where status sits, but not boxed */
  #status.cached {
    background: transparent !important;
    border: none !important;
    padding: 0.4rem !important;
    text-align: center;
    font-size: 0.78rem;
    color: var(--emd-text-tertiary);
    max-width: none;
    margin: 0 auto 0.5rem !important;
  }
  #status.cached a {
    color: var(--emd-primary);
    font-weight: 500;
    text-decoration: none;
  }
  #status.cached a:hover { text-decoration: underline; }

  .spinner {
    display: inline-block;
    width: 13px;
    height: 13px;
    border: 2px solid var(--emd-border);
    border-top-color: var(--emd-primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: -2px;
    margin-right: 0.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ============================================
     SUMMARY
     ============================================ */
  .summary {
    background: var(--emd-bg-secondary);
    border: 1px solid var(--emd-border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.75rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .summary-user {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .summary-user img {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid var(--emd-border);
  }
  .summary-user .name {
    font-size: 1rem;
    font-weight: 600;
    color: var(--emd-text);
  }
  .summary-user .handle {
    font-size: 0.78rem;
    color: var(--emd-text-tertiary);
    font-family: "JetBrains Mono", monospace;
  }
  .summary-stats { display: flex; gap: 1.75rem; }
  .summary-stat { text-align: right; }
  .summary-stat .val {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--emd-text);
    line-height: 1;
    font-feature-settings: "tnum";
  }
  .summary-stat .val.success { color: var(--emd-success); }
  .summary-stat .val.warning { color: var(--emd-danger); }
  .summary-stat .label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--emd-text-tertiary);
    margin-top: 0.3rem;
    font-weight: 600;
  }

  /* ============================================
     STAGE
     ============================================ */
  .stage { margin-bottom: 2rem; }

  .stage-header {
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    margin-bottom: 0.25rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--emd-border-light);
  }
  .stage-number {
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--emd-primary-dark);
    padding: 0.2rem 0.55rem;
    background: var(--emd-primary-light);
    border-radius: 4px;
  }
  .stage-title {
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--emd-text);
    margin: 0;
    letter-spacing: -0.01em;
  }
  .stage-desc {
    font-size: 0.85rem;
    color: var(--emd-text-secondary);
    margin: 0 0 1rem;
  }

  /* ============================================
     SECTION (within a stage)
     ============================================ */
  .section {
    background: white;
    border: 1px solid var(--emd-border);
    border-left: 2px solid var(--emd-text-tertiary);
    border-radius: 10px;
    margin-bottom: 0.85rem;
    overflow: hidden;
  }

  /* Type colour rules */
  .section.type-horizontal_grid_cell          { border-left-color: #2980b9; }
  .section.type-model_family                  { border-left-color: #f39c12; }
  .section.type-horizontal_computational_grid { border-left-color: #3498db; }
  .section.type-vertical_computational_grid   { border-left-color: #16a085; }
  .section.type-model_component               { border-left-color: #d35400; }
  .section.type-component_config              { border-left-color: #1abc9c; }
  .section.type-model                         { border-left-color: #e67e22; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 0.85rem;
    padding: 0.75rem 1rem;
    background: var(--emd-bg-secondary);
    border-bottom: 1px solid var(--emd-border);
    flex-wrap: wrap;
  }

  .section-title-block { flex: 1; min-width: 200px; }

  .section-title {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--emd-text);
    margin: 0;
    font-family: "JetBrains Mono", monospace;
    letter-spacing: -0.01em;
  }

  .section-meta {
    font-size: 0.72rem;
    color: var(--emd-text-tertiary);
    margin-top: 0.2rem;
    line-height: 1.4;
  }

  .req-tag {
    font-family: "JetBrains Mono", monospace;
    font-weight: 500;
    padding: 0 0.2rem;
  }
  .req-tag.req-horizontal_grid_cell          { color: #2980b9; }
  .req-tag.req-model_family                  { color: #f39c12; }
  .req-tag.req-horizontal_computational_grid { color: #3498db; }
  .req-tag.req-vertical_computational_grid   { color: #16a085; }
  .req-tag.req-model_component               { color: #d35400; }
  .req-tag.req-component_config              { color: #1abc9c; }
  .req-tag.req-model                         { color: #e67e22; }

  .section-progress {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-shrink: 0;
  }

  .progress-text {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--emd-text-secondary);
    font-family: "JetBrains Mono", monospace;
    white-space: nowrap;
    font-feature-settings: "tnum";
  }

  .progress-bar {
    width: 90px;
    height: 6px;
    background: var(--emd-border);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 3px;
    background: var(--emd-text-tertiary);
    transition: width 0.6s ease;
  }
  .progress-fill.type-horizontal_grid_cell          { background: #2980b9; }
  .progress-fill.type-model_family                  { background: #f39c12; }
  .progress-fill.type-horizontal_computational_grid { background: #3498db; }
  .progress-fill.type-vertical_computational_grid   { background: #16a085; }
  .progress-fill.type-model_component               { background: #d35400; }
  .progress-fill.type-component_config              { background: #1abc9c; }
  .progress-fill.type-model                         { background: #e67e22; }

  .section-add {
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--emd-text-secondary);
    text-decoration: none;
    padding: 0.3rem 0.65rem;
    border: 1px solid var(--emd-border);
    border-radius: 5px;
    background: white;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .section-add:hover { background: var(--emd-bg-secondary); }
  .section-add.type-horizontal_grid_cell:hover          { color: #2980b9; border-color: #2980b9; }
  .section-add.type-model_family:hover                  { color: #f39c12; border-color: #f39c12; }
  .section-add.type-horizontal_computational_grid:hover { color: #3498db; border-color: #3498db; }
  .section-add.type-vertical_computational_grid:hover   { color: #16a085; border-color: #16a085; }
  .section-add.type-model_component:hover               { color: #d35400; border-color: #d35400; }
  .section-add.type-component_config:hover              { color: #1abc9c; border-color: #1abc9c; }
  .section-add.type-model:hover                         { color: #e67e22; border-color: #e67e22; }

  /* ============================================
     CARDS
     ============================================ */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(245px, 1fr));
    gap: 0.55rem;
    padding: 0.85rem;
  }

  .empty-cards {
    padding: 1.5rem;
    text-align: center;
    color: var(--emd-text-tertiary);
    font-size: 0.85rem;
    background: white;
  }
  .empty-cards a {
    color: var(--emd-primary);
    text-decoration: none;
    font-weight: 500;
  }
  .empty-cards a:hover { text-decoration: underline; }

  .card {
    background: white;
    border: 1px solid var(--emd-border);
    border-left: 4px solid var(--emd-text-tertiary);
    border-radius: 6px;
    padding: 0.6rem 0.75rem;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
    text-decoration: none;
    color: inherit;
    transition: all 0.15s ease;
    position: relative;
  }

  .card.type-horizontal_grid_cell          { border-left-color: #2980b9; }
  .card.type-model_family                  { border-left-color: #f39c12; }
  .card.type-horizontal_computational_grid { border-left-color: #3498db; }
  .card.type-vertical_computational_grid   { border-left-color: #16a085; }
  .card.type-model_component               { border-left-color: #d35400; }
  .card.type-component_config              { border-left-color: #1abc9c; }
  .card.type-model                         { border-left-color: #e67e22; }

  .card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); transform: translateY(-1px); }
  .card.type-horizontal_grid_cell:hover          { border-color: #2980b9; }
  .card.type-model_family:hover                  { border-color: #f39c12; }
  .card.type-horizontal_computational_grid:hover { border-color: #3498db; }
  .card.type-vertical_computational_grid:hover   { border-color: #16a085; }
  .card.type-model_component:hover               { border-color: #d35400; }
  .card.type-component_config:hover              { border-color: #1abc9c; }
  .card.type-model:hover                         { border-color: #e67e22; }

  /* Closed (merged) — subtle green tint */
  .card.merged { background: #f6fcf9; }

  /* Closed (not merged, no record reference) — subtle purple tint, muted */
  .card.closed {
    background: #fbfaff;
    opacity: 0.85;
  }

  /* Closed but points to an existing record (duplicate-detection case)
     — purple tint, but NOT dimmed: the submitter has a useful pointer. */
  .card.exists {
    background: #fbfaff;
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.5rem;
  }

  .card-number {
    font-family: "JetBrains Mono", monospace;
    font-size: 0.7rem;
    color: var(--emd-text-tertiary);
    font-weight: 500;
    flex-shrink: 0;
  }

  .card-pills {
    display: flex;
    gap: 0.25rem;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .card-state {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 700;
    padding: 0.15rem 0.5rem;
    border-radius: 10px;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
  }

  .state-merged {
    color: var(--emd-success);
    background: var(--emd-success-light);
  }
  .state-merged .check {
    font-size: 0.85em;
    line-height: 1;
    font-weight: 900;
  }
  .state-closed {
    color: var(--emd-purple);
    background: var(--emd-purple-light);
  }
  /* "exists" — same purple palette as closed (still not merged), but its
     own key so we can iterate styling independently later if needed. */
  .state-exists {
    color: var(--emd-purple);
    background: var(--emd-purple-light);
  }
  .state-open {
    color: var(--emd-primary-dark);
    background: var(--emd-primary-light);
  }
  .state-approved {
    color: #166534;
    background: #d1fae5;
  }
  .state-changes-requested {
    color: white;
    background: var(--emd-danger);
  }
  .state-changes-made {
    color: #1e40af;
    background: var(--emd-info-light);
  }

  @keyframes attention-flash {
    0%, 100% {
      background: var(--emd-danger);
      box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.55);
    }
    50% {
      background: #b91c1c;
      box-shadow: 0 0 0 5px rgba(239, 68, 68, 0);
    }
  }
  .card-state.flash {
    animation: attention-flash 1.1s ease-in-out infinite;
  }

  .card-title {
    font-size: 0.83rem;
    font-weight: 500;
    color: var(--emd-text);
    line-height: 1.35;
    word-break: break-word;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  /* Closed-with-ID cards: show the assigned ID code-style */
  .card.merged .card-title,
  .card.closed .card-title,
  .card.exists .card-title {
    font-family: "JetBrains Mono", monospace;
    font-weight: 600;
    font-size: 0.82rem;
  }

  .card-meta {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    align-items: center;
    font-size: 0.68rem;
    color: var(--emd-text-tertiary);
    font-family: "JetBrains Mono", monospace;
  }

  /* ============================================
     RESPONSIVE
     ============================================ */
  @media (max-width: 640px) {
    .hero h1 { font-size: 1.6rem; }
    .hero { padding: 2rem 0 1.5rem; }
    .summary { flex-direction: column; align-items: flex-start; }
    .summary-stats { gap: 1.25rem; width: 100%; justify-content: space-around; }
    .summary-stat { text-align: center; }
    .section-header { padding-right: 0.85rem; }
    .section-progress { width: 100%; padding-left: 0; justify-content: space-between; }
    .progress-bar { flex: 1; max-width: 200px; }
    .cards { grid-template-columns: 1fr; }
  }

  .hidden { display: none !important; }
</style>
</head>

<body>

<div class="container">

  <section class="hero" id="hero">
    <h1>Submission Progress</h1>
    <p class="subtitle">Track your contributions to the Essential Model Documentation</p>
    <form class="search-form" id="search-form">
      <input type="text" id="handle" placeholder="Your GitHub handle…" autocomplete="off" spellcheck="false">
      <button type="submit" id="search-btn">Track</button>
    </form>
    <div class="hero-links">
      <a href="https://emd.mipcvs.dev" target="_blank" rel="noopener">EMD Documentation</a>
      <span class="sep">·</span>
      <a href="https://github.com/WCRP-CMIP/Essential-Model-Documentation/issues/new/choose" target="_blank" rel="noopener">Open a submission form →</a>
    </div>
  </section>

  <div id="status"></div>
  <div id="results" class="hidden"></div>

</div>

<script>
"use strict";

/* ============================================
   CONFIG
   ============================================ */
const REPO_OWNER = "WCRP-CMIP";
const REPO_NAME  = "Essential-Model-Documentation";
const SUBMISSION_LABEL = "emd-submission";

const NEW_ISSUE = (tpl) =>
  `https://github.com/${REPO_OWNER}/${REPO_NAME}/issues/new?template=${tpl}`;

const TYPE_KEYS = [
  "horizontal_grid_cell",
  "model_family",
  "horizontal_computational_grid",
  "vertical_computational_grid",
  "model_component",
  "component_config",
  "link_existing_component",
  "model"
];

const STAGES = [
  {
    number: 1,
    title: "Foundation",
    desc: "Grid cells and family records — the building blocks referenced everywhere else.",
    sections: [
      {
        key: "horizontal_grid_cell",
        title: "horizontal_grid_cell",
        labels: ["horizontal_grid_cell"],
        requires: [],
        newUrl: NEW_ISSUE("horizontal_grid_cell.yml")
      },
      {
        key: "model_family",
        title: "model_family",
        labels: ["model_family"],
        note: "Covers both component families (NEMO, ARPEGE…) and ESM families (HadGEM3, CNRM-CM…) — same form, distinguished by family_type.",
        requires: [],

/* ============================================
   DOM helpers
   ============================================ */
const $ = (id) => document.getElementById(id);

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) {
    for (const k in attrs) {
      const v = attrs[k];
      if (v == null || v === false) continue;
      if (k === "class") e.className = v;
      else if (k === "style" && typeof v === "object") {
        for (const prop in v) e.style[prop] = v[prop];
      }
      else if (k === "html") e.innerHTML = v;
      else if (k.startsWith("on") && typeof v === "function") {
        e.addEventListener(k.slice(2).toLowerCase(), v);
      } else {
        e.setAttribute(k, v);
      }
    }
  }
  children.flat().forEach(c => {
    if (c == null || c === false) return;
    e.appendChild(typeof c === "string" || typeof c === "number"
      ? document.createTextNode(String(c))
      : c);
  });
  return e;
}

/* ============================================
   CACHE (sessionStorage, 5-minute TTL)

   Cuts API pressure: a reload within the TTL serves instantly without
   touching GitHub. Cache is keyed by handle (lowercased) and lives only
   for the current tab/session — close the tab and it's gone.
   ============================================ */
const CACHE_TTL_MS = 5 * 60 * 1000;

function cacheKey(handle) {
  return `emd-tracker:${handle.toLowerCase()}`;
}

/* Strip GitHub objects down to just the fields the UI uses, so a power
   user with 400 issues doesn't blow through sessionStorage quota. */
function trimIssue(issue) {
  return {
    number: issue.number,
    title: issue.title,
    state: issue.state,
    state_reason: issue.state_reason,
    updated_at: issue.updated_at,
    html_url: issue.html_url,
    labels: (issue.labels || []).map(l => typeof l === "string" ? l : { name: l.name })
  };
}
function trimProfile(p) {
  return { login: p.login, name: p.name, avatar_url: p.avatar_url, html_url: p.html_url };
}

function getCached(handle) {
  try {
    const raw = sessionStorage.getItem(cacheKey(handle));
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (Date.now() - parsed.ts > CACHE_TTL_MS) return null;
    return { profile: parsed.profile, issues: parsed.issues, ageMs: Date.now() - parsed.ts };
  } catch { return null; }
}

function setCached(handle, profile, issues) {
  try {
    sessionStorage.setItem(cacheKey(handle), JSON.stringify({
      ts: Date.now(),
      profile: trimProfile(profile),
      issues: issues.map(trimIssue)
    }));
  } catch { /* quota exceeded or storage disabled — skip silently */ }
}

function clearCached(handle) {
  try { sessionStorage.removeItem(cacheKey(handle)); } catch {}
}

/* ============================================
   GITHUB API
   ============================================ */
async function fetchUserProfile(handle) {
  const r = await fetch(`https://api.github.com/users/${encodeURIComponent(handle)}`);
  if (r.status === 404) throw new Error(`GitHub user "@${handle}" not found.`);
  if (r.status === 403) throw rateLimitMessage(r);
  if (!r.ok) throw new Error(`GitHub API error (${r.status})`);
  return r.json();
}

async function fetchUserIssues(handle) {
  const q = [
    `repo:${REPO_OWNER}/${REPO_NAME}`,
    `author:${handle}`,
    `label:${SUBMISSION_LABEL}`,
    `is:issue`
  ].join("+");

  let page = 1;
  let results = [];

  while (true) {
    const url = `https://api.github.com/search/issues?q=${q}&per_page=100&page=${page}&sort=updated&order=desc`;
    const r = await fetch(url);

    if (r.status === 403) throw rateLimitMessage(r);
    if (!r.ok) throw new Error(`Search API error (${r.status})`);

    const data = await r.json();
    const items = data.items || [];
    results = results.concat(items);

    if (items.length < 100) break;
    page++;
    if (page > 5) break;
  }

  return results;
}

/* Build a rich, multi-paragraph explanation for the rate-limit case.
   Returns an Error with a .html property — callers throw it as-is;
   the catch handler renders .html via innerHTML if present. */
function rateLimitMessage(response) {
  const reset = response.headers.get("X-RateLimit-Reset");
  let waitText, resetText;

  if (reset) {
    const waitSec = Math.max(0, reset * 1000 - Date.now()) / 1000;
    const mins = Math.ceil(waitSec / 60);
    waitText  = `~${mins} minute${mins === 1 ? "" : "s"}`;
    resetText = new Date(reset * 1000).toLocaleTimeString([], {
      hour: "2-digit", minute: "2-digit"
    });
  } else {
    waitText  = "a few minutes";
    resetText = null;
  }

  const ghLink = `https://github.com/${REPO_OWNER}/${REPO_NAME}/issues?q=is%3Aissue+label%3A${SUBMISSION_LABEL}`;

  const html = `
    <div class="rate-limit-msg">
      <p><strong>GitHub rate limit reached</strong> — try again in ${waitText}.</p>

      <p>This page uses GitHub's public API, which allows <strong>60 requests per hour per IP address</strong> (search endpoints are even stricter). Each page load typically costs 2 requests, but up to 6 for users with many submissions.</p>

      <p>If you're on an <strong>institutional network or VPN</strong>, dozens of colleagues may share your public IP — so the limit can be exhausted by other people, even if you've only loaded the page once.</p>

      <p><strong>Things to try:</strong></p>
      <ul>
        <li>Wait ${waitText} and reload</li>
        <li>Try from a <strong>different network</strong> (mobile data, home WiFi, hotspot)</li>
        <li>Open your submissions directly on <a href="${ghLink}" target="_blank" rel="noopener">GitHub</a> — the GitHub UI doesn't have this limit</li>
      </ul>

      ${resetText ? `<p class="reset-time">Reset at ${resetText} (local time)</p>` : ""}
    </div>
  `;

  const err = new Error("GitHub rate limit reached");
  err.html = html;
  return err;
}

/* ============================================
   ISSUE INSPECTION
   ============================================ */
function getLabels(issue) {
  return issue.labels.map(l => typeof l === "string" ? l : l.name);
}

function getTypeKey(issue) {
  for (const l of getLabels(issue)) {
    if (TYPE_KEYS.includes(l)) return l;
  }
  return null;
}

/* Extracts the workflow's "| g109 |" style record-ID stamp from a title.
   The workflow puts the assigned ID between pipes on merge, and the
   existing-record ID on duplicate-detection close. Returns null if
   no pipe-bracketed segment is found. */
function getPipeId(title) {
  const matches = [...title.matchAll(/\|\s*([^|]+?)\s*\|/g)];
  return matches.length > 0 ? matches[matches.length - 1][1].trim() : null;
}

/* A "merge" close is the default GitHub state_reason. "not_planned"
   is the explicit reason used for withdrawals and duplicate-detection
   auto-closes. Pre-state_reason legacy issues are null — treat as merged. */
function isMerged(issue) {
  return issue.state === "closed" && issue.state_reason !== "not_planned";
}

/* Determine the closed-card state:
     "merged"  → green ✓
     "exists"  → purple, with the existing record ID as the title
                  (closed-not-merged, but title carries a "| g### |" stamp,
                  i.e. duplicate-detection: the record lives elsewhere)
     "closed"  → purple, plain
   Returns one of those strings, or null if not closed. */
function getClosedKind(issue) {
  if (issue.state !== "closed") return null;
  if (isMerged(issue)) return "merged";
  if (getPipeId(issue.title)) return "exists";
  return "closed";
}

/* Build the full list of pill descriptors. For open issues, every
   applicable review label is shown so the submitter sees the full
   review history at a glance. `needs-review` is intentionally ignored. */
function getStatePills(issue) {
  const closedKind = getClosedKind(issue);
  if (closedKind === "merged") return [{ key: "merged", text: "merged", icon: "✓" }];
  if (closedKind === "exists") return [{ key: "exists", text: "exists" }];
  if (closedKind === "closed") return [{ key: "closed", text: "closed" }];

  const labels   = getLabels(issue);
  const hasReq   = labels.includes("changes-requested");
  const hasMade  = labels.includes("changes-made");
  const approved = labels.includes("approved");

  const pills = [];

  if (hasReq) {
    pills.push({
      key: "changes-requested",
      text: "changes requested",
      flash: !hasMade && !approved
    });
  }
  if (hasMade) {
    pills.push({ key: "changes-made", text: "changes made" });
  }
  if (approved) {
    pills.push({ key: "approved", text: "awaiting merge" });
  }
  if (pills.length === 0) {
    pills.push({ key: "open", text: "in progress" });
  }
  return pills;
}

function cleanTitle(title) {
  let t = title;
  for (const lbl of TYPE_KEYS) {
    t = t.replace(new RegExp(`\\b${lbl}\\b`, "gi"), "");
  }
  t = t.replace(/^\s*(new|modify|update|add)\s*[:\-]\s*/i, "");
  t = t.replace(/\s{2,}/g, " ").trim();
  return t || title;
}

/* For closed issues that carry a "| g### |" ID stamp, show ONLY the ID. */
function getCardTitle(issue) {
  if (issue.state === "closed") {
    const id = getPipeId(issue.title);
    if (id) return id;
  }
  return cleanTitle(issue.title);
}

function relativeDate(iso) {
  const d = new Date(iso);
  const days = Math.floor((Date.now() - d.getTime()) / 86400000);
  if (days < 1)   return "today";
  if (days < 2)   return "yesterday";
  if (days < 7)   return `${days}d ago`;
  if (days < 30)  return `${Math.floor(days / 7)}w ago`;
  if (days < 365) return `${Math.floor(days / 30)}mo ago`;
  return `${Math.floor(days / 365)}y ago`;
}

function sortIssues(issues) {
  return [...issues].sort((a, b) => {
    const sa = a.state === "open" ? 0 : 1;
    const sb = b.state === "open" ? 0 : 1;
    if (sa !== sb) return sa - sb;

    if (a.state === "open") {
      const la = getLabels(a), lb = getLabels(b);
      const aUrgent = la.includes("changes-requested") && !la.includes("changes-made") && !la.includes("approved");
      const bUrgent = lb.includes("changes-requested") && !lb.includes("changes-made") && !lb.includes("approved");
      if (aUrgent !== bUrgent) return aUrgent ? -1 : 1;
    }

    return new Date(b.updated_at) - new Date(a.updated_at);
  });
}

/* ============================================
   CATEGORIZATION
   ============================================ */
function isSkipped(issue) {
  return /\|\s*skip\s*\|/i.test(issue.title);
}

function categorize(issues) {
  const buckets = {};
  for (const stage of STAGES) {
    for (const s of stage.sections) buckets[s.key] = [];
  }
  for (const issue of issues) {
    if (isSkipped(issue)) continue;
    const labels = getLabels(issue);
    let placed = false;
    for (const stage of STAGES) {
      for (const section of stage.sections) {
        if (labels.some(l => section.labels.includes(l))) {
          buckets[section.key].push(issue);
          placed = true;
          break;
        }
      }
      if (placed) break;
    }
  }
  return buckets;
}

/* ============================================
   RENDERING
   ============================================ */
function renderSummary(profile, issues) {
  const visible = issues.filter(i => !isSkipped(i));
  const total  = visible.length;
  const merged = visible.filter(isMerged).length;
  const open   = visible.filter(i => i.state === "open").length;
  const needsAction = visible.filter(i => {
    if (i.state !== "open") return false;
    const l = getLabels(i);
    return l.includes("changes-requested") && !l.includes("changes-made") && !l.includes("approved");
  }).length;

  return el("div", { class: "summary" },
    el("div", { class: "summary-user" },
      el("img", { src: profile.avatar_url, alt: profile.login }),
      el("div", null,
        el("div", { class: "name" }, profile.name || profile.login),
        el("a", {
          class: "handle",
          href: profile.html_url,
          target: "_blank",
          rel: "noopener",
          style: { textDecoration: "none", color: "inherit" }
        }, "@" + profile.login)
      )
    ),
    el("div", { class: "summary-stats" },
      el("div", { class: "summary-stat" },
        el("div", { class: "val" }, total),
        el("div", { class: "label" }, "Submitted")
      ),
      el("div", { class: "summary-stat" },
        el("div", { class: "val success" }, merged),
        el("div", { class: "label" }, "Merged")
      ),
      el("div", { class: "summary-stat" },
        el("div", { class: "val" }, open),
        el("div", { class: "label" }, "Open")
      ),
      needsAction > 0
        ? el("div", { class: "summary-stat" },
            el("div", { class: "val warning" }, needsAction),
            el("div", { class: "label" }, "Your turn")
          )
        : null
    )
  );
}

function renderPill(pill) {
  const children = [];
  if (pill.icon) children.push(el("span", { class: "check" }, pill.icon));
  children.push(pill.text);
  return el("span", {
    class: `card-state state-${pill.key}` + (pill.flash ? " flash" : "")
  }, ...children);
}

function renderCard(issue) {
  const pills   = getStatePills(issue);
  const typeKey = getTypeKey(issue);
  const title   = getCardTitle(issue);

  const classes = ["card"];
  if (typeKey) classes.push("type-" + typeKey);

  const closedKind = getClosedKind(issue);
  if (closedKind)        classes.push(closedKind);   // "merged" | "exists" | "closed"
  else                   classes.push("open");

  return el("a", {
      class: classes.join(" "),
      href: issue.html_url,
      target: "_blank",
      rel: "noopener",
      title: issue.title
    },
    el("div", { class: "card-top" },
      el("span", { class: "card-number" }, "#" + issue.number),
      el("div", { class: "card-pills" }, ...pills.map(renderPill))
    ),
    el("div", { class: "card-title" }, title),
    el("div", { class: "card-meta" },
      el("span", null, "updated " + relativeDate(issue.updated_at))
    )
  );
}

function renderRequires(section) {
  if (!section.requires.length && !section.note) return null;
  const children = [];

  if (section.requires.length) {
    children.push("requires: ");
    section.requires.forEach((req, i) => {
      if (i > 0) children.push(el("span", { style: { color: "var(--emd-text-tertiary)" } }, "  +  "));
      children.push(el("span", { class: "req-tag req-" + req }, req));
    });
  }
  if (section.note) {
    if (section.requires.length) children.push(el("br"));
    children.push(el("span", { style: { fontStyle: "italic" } }, section.note));
  }
  return el("div", { class: "section-meta" }, ...children);
}

function renderSection(section, issues) {
  const sorted = sortIssues(issues);
  const total  = sorted.length;
  const done   = sorted.filter(isMerged).length;
  const pct    = total === 0 ? 0 : Math.round((done / total) * 100);

  const cardsArea = total === 0
    ? el("div", { class: "empty-cards" },
        "No submissions yet — ",
        el("a", { href: section.newUrl, target: "_blank", rel: "noopener" }, "open a new one →")
      )
    : el("div", { class: "cards" }, ...sorted.map(renderCard));

  return el("div", { class: "section type-" + section.key },
    el("div", { class: "section-header" },
      el("div", { class: "section-title-block" },
        el("h3", { class: "section-title" }, section.title),
        renderRequires(section)
      ),
      el("div", { class: "section-progress" },
        el("span", { class: "progress-text" }, `${done} / ${total}`),
        el("div", { class: "progress-bar" },
          el("div", {
            class: "progress-fill type-" + section.key,
            style: { width: pct + "%" }
          })
        ),
        el("a", {
          class: "section-add type-" + section.key,
          href: section.newUrl,
          target: "_blank",
          rel: "noopener",
          title: "Open a new " + section.title + " submission"
        }, "+ new")
      )
    ),
    cardsArea
  );
}

function renderStage(stage, buckets) {
  return el("div", { class: "stage" },
    el("div", { class: "stage-header" },
      el("span", { class: "stage-number" }, "Stage " + stage.number),
      el("h2", { class: "stage-title" }, stage.title)
    ),
    el("p", { class: "stage-desc" }, stage.desc),
    ...stage.sections.map(s => renderSection(s, buckets[s.key] || []))
  );
}

function render(profile, issues) {
  const results = $("results");
  results.innerHTML = "";
  results.appendChild(renderSummary(profile, issues));

  const buckets = categorize(issues);
  for (const stage of STAGES) {
    results.appendChild(renderStage(stage, buckets));
  }

  results.classList.remove("hidden");
  $("hero").classList.add("compact");
  $("status").innerHTML = "";
  $("status").className = "";
  postHeight();
}

/* ============================================
   MAIN FLOW
   ============================================ */
async function track(handle) {
  handle = handle.trim().replace(/^@+/, "");
  if (!handle) return;

  const url = new URL(window.location);
  url.searchParams.set("handle", handle);
  window.history.replaceState({}, "", url);

  // ── Cache hit: serve instantly, no API call ──────────────────────────
  const cached = getCached(handle);
  if (cached) {
    render(cached.profile, cached.issues);
    const ageMin  = Math.floor(cached.ageMs / 60000);
    const ageText = ageMin < 1 ? "just now" : `${ageMin} min ago`;
    $("status").className = "cached";
    $("status").innerHTML =
      `Showing cached data from ${ageText} — ` +
      `<a href="#" id="cache-refresh">refresh from GitHub</a>`;
    const refreshLink = document.getElementById("cache-refresh");
    if (refreshLink) {
      refreshLink.addEventListener("click", (e) => {
        e.preventDefault();
        clearCached(handle);
        track(handle);
      });
    }
    return;
  }

  $("results").classList.add("hidden");
  $("search-btn").disabled = true;
  $("status").className = "";
  $("status").innerHTML = `<span class="spinner"></span>Looking up <strong>@${handle}</strong>…`;

  try {
    const [profile, issues] = await Promise.all([
      fetchUserProfile(handle),
      fetchUserIssues(handle)
    ]);
    setCached(handle, profile, issues);
    render(profile, issues);
  } catch (e) {
    $("status").className = "error" + (e.html ? " rich" : "");
    if (e.html) {
      $("status").innerHTML = e.html;
    } else {
      $("status").textContent = e.message || String(e);
    }
    $("results").classList.add("hidden");
    $("hero").classList.remove("compact");
    postHeight();
  } finally {
    $("search-btn").disabled = false;
  }
}

/* ============================================
   IFRAME HEIGHT MESSAGING
   ============================================ */
function postHeight() {
  if (window.parent === window) return;
  requestAnimationFrame(() => {
    const h = document.documentElement.scrollHeight + 40;
    window.parent.postMessage({ type: "emd-progress-height", height: h }, "*");
  });
}

/* ============================================
   BOOT
   ============================================ */
$("search-form").addEventListener("submit", (e) => {
  e.preventDefault();
  track($("handle").value);
});

const params = new URLSearchParams(window.location.search);
const initialHandle = params.get("handle");
if (initialHandle) {
  $("handle").value = initialHandle;
  track(initialHandle);
} else {
  $("handle").focus();
}

if (window.ResizeObserver) {
  new ResizeObserver(postHeight).observe(document.body);
}
window.addEventListener("load", postHeight);
</script>
