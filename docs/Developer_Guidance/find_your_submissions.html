<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EMD Issue Tree Viewer</title>
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
  body {
    margin: 0;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    background: transparent;
  }

  #nav {
    position: sticky;
    top: 0;
    background: white;
    border-bottom: 1px solid #eee;
    padding: 6px 10px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
  }

  #goto {
    padding: 4px 6px;
    font-family: inherit;
    font-size: 12px;
    border: 1px solid #ddd;
    border-radius: 4px;
    width: 240px;
  }

  #container {
    width: 100%;
    overflow-y: auto;
    overflow-x: hidden;
  }

  svg {
    width: 100%;
    display: block;
  }

  .link {
    fill: none;
    stroke: #e0e0e0;
    stroke-width: 1.2px;
  }

  .author-label {
    font-size: 12px;
    font-weight: 600;
    text-anchor: end;
    dominant-baseline: central;
  }

  .issue text {
    font-size: 11px;
    dominant-baseline: central;
  }

  .issue.open text { fill: #1f77b4; }
  .issue.closed text { fill: #888; }

  .tag {
    font-size: 9px;
    fill: white;
  }
</style>
</head>

<body>

<div id="nav">
  <label for="goto">Go to:</label>
  <input id="goto" list="authors" placeholder="Select author..." />
  <datalist id="authors"></datalist>
</div>

<div id="container">
  <svg></svg>
</div>

<script>

const owner = "WCRP-CMIP";
const repo = "Essential-Model-Documentation";
const label = "emd-submission";

const TAG_COLORS = {
  component_config: "#1abc9c",
  horizontal_computational_grid: "#3498db",
  horizontal_grid_cell: "#2980b9",
  horizontal_subgrid: "#8e44ad",
  model: "#e67e22",
  model_component: "#d35400",
  model_family: "#f39c12",
  vertical_computational_grid: "#16a085"
};

const svg = d3.select("svg");

svg.attr("width", window.innerWidth)
   .attr("height", 2000);

const g = svg.append("g");

const tree = d3.tree().nodeSize([28, 320]);

let root, i = 0;

/* ---------------- FETCH ---------------- */
async function fetchAllIssues() {
  let page = 1;
  let results = [];

  while (true) {
    const url =
      `https://api.github.com/repos/${owner}/${repo}/issues?state=all&labels=${label}&per_page=100&page=${page}`;

    const res = await fetch(url);
    if (res.status === 403) {
      await new Promise(r => setTimeout(r, 1500));
      continue;
    }

    const data = await res.json();
    if (!data.length) break;

    results = results.concat(data);
    page++;
  }

  return results.filter(d => !d.pull_request);
}

/* ---------------- CLEAN TITLE ---------------- */
function cleanTitle(title, tags) {
  let t = title;

  tags.forEach(tag => {
    t = t.replace(new RegExp(tag, "gi"), "");
  });

  t = t.replace(/^\s*(new|modify)\s*:\s*/i, "");
  return t.replace(/\s+/g, " ").trim();
}

/* ---------------- BUILD ---------------- */
function buildTree(issues) {
  const authors = {};

  issues.forEach(issue => {
    const login = issue.user.login;

    if (!authors[login]) {
      authors[login] = { name: login, children: [] };
    }

    const tags = issue.labels
      .map(l => l.name)
      .filter(l => TAG_COLORS[l]);

    authors[login].children.push({
      name: cleanTitle(issue.title, tags),
      state: issue.state,
      url: issue.html_url,
      tags
    });
  });

  Object.values(authors).forEach(a => {
    a.children.sort((a, b) =>
      a.state === b.state ? 0 : a.state === "open" ? -1 : 1
    );
  });

  return { name: "root", children: Object.values(authors) };
}

/* ---------------- NAV ---------------- */
function buildNav(authors) {
  const datalist = document.getElementById("authors");
  const input = document.getElementById("goto");

  datalist.innerHTML = "";

  authors.forEach(a => {
    const opt = document.createElement("option");
    opt.value = a;
    datalist.appendChild(opt);
  });

  input.addEventListener("change", () => {
    const val = input.value;
    const el = document.querySelector(`[data-author="${val}"]`);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
  });
}

/* ---------------- RENDER ---------------- */
function update(source) {
  tree(root);

  const nodes = root.descendants().filter(d => d.depth !== 0);
  const links = root.links().filter(d => d.source.depth !== 0);

  g.selectAll(".link")
    .data(links, d => d.target.id)
    .join("path")
    .attr("class", "link")
    .attr("d", d3.linkHorizontal()
      .x(d => d.y)
      .y(d => d.x)
    );

  const node = g.selectAll(".node")
    .data(nodes, d => d.id || (d.id = ++i));

  const enter = node.enter()
    .append("g")
    .attr("data-author", d => d.depth === 1 ? d.data.name : null)
    .attr("transform", d => `translate(${source.y0||0},${source.x0||0})`);

  /* AUTHORS */
  enter.filter(d => d.depth === 1)
    .append("text")
    .attr("class", "author-label")
    .attr("x", -10)
    .text(d => d.data.name);

  /* ISSUES */
  enter.filter(d => d.depth === 2)
    .each(function(d) {
      let xOffset = 6;
      const gNode = d3.select(this);

      d.data.tags.forEach(tag => {
        const w = Math.max(28, tag.length * 7 + 20);

        gNode.append("rect")
          .attr("x", xOffset)
          .attr("y", -8)
          .attr("width", w)
          .attr("height", 16)
          .attr("rx", 4)
          .attr("fill", TAG_COLORS[tag]);

        gNode.append("text")
          .attr("x", xOffset + w / 2)
          .attr("y", 0)
          .attr("text-anchor", "middle")
          .attr("dominant-baseline", "central")
          .attr("class", "tag")
          .text(tag);

        xOffset += w + 6;
      });

      const prefix = d.data.state === "closed" ? "+ " : "- ";

      gNode.append("a")
        .attr("href", d.data.url)
        .attr("target", "_blank")
        .append("text")
        .attr("class", d.data.state)
        .attr("x", xOffset + 6)
        .text(prefix + truncate(d.data.name, 110));
    });

  node.merge(enter)
    .attr("transform", d => `translate(${d.y},${d.x})`);

  node.exit().remove();
}

/* ---------------- FIT ---------------- */
function fitToContent() {
  const bbox = g.node().getBBox();

  const totalHeight = bbox.height + 200;

  svg
    .attr("width", window.innerWidth)
    .attr("height", totalHeight);

  g.attr("transform", `translate(${140 - bbox.x},${40 - bbox.y})`);

  // Notify parent frame of full height so iframe can resize
  if (window.parent !== window) {
    window.parent.postMessage({ type: "emd-tree-height", height: totalHeight + 60 }, "*");
  }
}

/* ---------------- UTIL ---------------- */
function truncate(str, n) {
  return str.length > n ? str.slice(0, n) + "…" : str;
}

/* ---------------- RUN ---------------- */
(async () => {
  const issues = await fetchAllIssues();
  const data = buildTree(issues);

  const authors = data.children.map(d => d.name);
  buildNav(authors);

  root = d3.hierarchy(data);
  root.x0 = 0;
  root.y0 = 0;

  update(root);

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      fitToContent();
    });
  });
})();

</script>
</body>
</html>
