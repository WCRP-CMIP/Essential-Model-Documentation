name: ⛩ Merge Gate

# Runs exactly when someone clicks merge (adds PR to the merge queue).
# If this workflow fails, the merge is blocked.
#
# SETUP REQUIRED (one-time, in GitHub repo settings):
#   Settings → Branches → Branch protection rules → src-data
#     - Enable "Require merge queue"
#     - Require status check: "merge-gate"
#
# GitHub creates a temporary branch merging the PR + current src-data,
# so this always tests the real merged state, never stale results.

on:
  merge_group:
    branches:
      - src-data

permissions:
  contents: read

jobs:
  merge-gate:
    name: merge-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merged state
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install CMIPLD
        uses: WCRP-CMIP/CMIPLD/actions/cmipld@main

      - name: Validate horizontal_grid_cell JSON files
        run: |
          python3 - <<'PYEOF'
          import json, sys, os, glob

          REQUIRED_KEYS = [
              "validation_key", "ui_label", "description",
              "grid_mapping", "grid_type", "n_cells", "region",
              "southernmost_latitude", "temporal_refinement",
              "truncation_method", "truncation_number", "horizontal_units",
              "westernmost_longitude", "x_resolution", "y_resolution",
          ]

          errors = []
          files  = sorted(glob.glob("horizontal_grid_cell/g*.json"))

          summary = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")
          with open(summary, "a") as s:
              s.write("## Merge Gate Validation\n\n")

          for path in files:
              try:
                  d = json.load(open(path))
              except json.JSONDecodeError as e:
                  errors.append(f"{path}: invalid JSON — {e}")
                  continue

              for key in REQUIRED_KEYS:
                  if key not in d:
                      errors.append(f"{path}: missing key '{key}'")

              if d.get("@id") != d.get("validation_key"):
                  errors.append(f"{path}: @id {d.get('@id')!r} != validation_key {d.get('validation_key')!r}")

          with open(summary, "a") as s:
              if errors:
                  s.write(f"**{len(errors)} error(s) found — merge blocked.**\n\n")
                  for e in errors:
                      s.write(f"- ❌ {e}\n")
              else:
                  s.write(f"✅ All {len(files)} files passed.\n")

          if errors:
              for e in errors:
                  print(f"ERROR: {e}", file=sys.stderr)
              sys.exit(1)

          print(f"All {len(files)} files passed.")
          PYEOF
