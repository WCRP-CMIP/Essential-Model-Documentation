  - type: dropdown
    id: license_type
    attributes:
      label: License Type
      description: Primary license for model code and documentation.
      options:        - universal:license/cc-by-4.0        - universal:license/cc-by-nc-sa-4.0        - universal:license/cc-by-sa-4.0        - universal:license/cc0-1.0        - Other - see description
        - Proprietary
        - Multiple licenses

  - type: input
    id: model_repository
    attributes:
      label: Code Repository
      description: URL to source code repository (if publicly available).
      placeholder: "https://github.com/institution/model-name"

  - type: input
    id: documentation_portal
    attributes:
      label: Documentation Portal
      description: Main website for model documentation and resources.
      placeholder: "https://model-docs.institution.org"
