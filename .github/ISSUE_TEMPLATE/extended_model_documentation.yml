name: Extended Model Documentation (Optional)
description: Submit additional comprehensive documentation beyond the EMD specification requirements.
title: "[EMD Extended] Optional Enhanced Documentation"
labels: ["emd-extended", "optional"]
body:
  - type: markdown
    attributes:
      value: |
        ## Instructions
        This template captures **additional model documentation** that goes beyond the EMD specification requirements.
        
        **This is OPTIONAL** - complete the standard EMD templates first:
        - Top Level Model Submission (required for CMIP7)
        - Model Component Submission (required for each component)
        
        This extended documentation provides enhanced scientific and technical details that may be valuable 
        for the broader community.

  - type: input
    id: model_name
    attributes:
      label: Model Name
      description: Reference model name (should match EMD submission).
      placeholder: "e.g., CESM2, HadGEM3-GC31-HH"
    validations:
      required: true

  - type: input
    id: model_acronym
    attributes:
      label: Model Acronym
      description: Standard acronym used to identify this model.
      placeholder: "e.g., CESM2, ICON-ESM, UKESM1"

  - type: dropdown
    id: model_type
    attributes:
      label: Model Type
      description: Primary classification of this model.
      options:        - universal:source-type/aer        - universal:source-type/agcm        - universal:source-type/aogcm        - universal:source-type/bgc        - universal:source-type/chem        - universal:source-type/gridded-insitu        - universal:source-type/ism        - universal:source-type/land        - universal:source-type/ogcm        - universal:source-type/rad        - universal:source-type/reanalysis        - universal:source-type/satellite-blended        - universal:source-type/satellite-retrieval        - universal:source-type/slab
  - type: dropdown
    id: model_scope
    attributes:
      label: Model Scope
      description: Spatial scope of the model domain.
      options:
        - Global
        - Regional
        - Local/Limited Area

  - type: input
    id: coupler_name
    attributes:
      label: Coupler Name
      description: Name and version of the coupling software used.
      placeholder: "e.g., OASIS3-MCT v3.0, FMS Coupler, MCT 2.11"

  - type: textarea
    id: typical_resolution
    attributes:
      label: Typical Resolution Configuration
      description: Standard resolution configuration for this model.
      placeholder: "e.g., ~100km atmosphere, ~1° ocean, T63L47 atmosphere, ORCA1L75 ocean"

  - type: checkboxes
    id: supported_experiments
    attributes:
      label: Supported CMIP7 Experiments
      description: Select CMIP7 experiments this model can perform.
      options:        - label: cmip7:experiment/1pctco2-bgc        - label: cmip7:experiment/1pctco2-rad        - label: cmip7:experiment/1pctco2        - label: cmip7:experiment/abrupt-0p5co2        - label: cmip7:experiment/abrupt-0p5xco2        - label: cmip7:experiment/abrupt-127k        - label: cmip7:experiment/abrupt-2xco2        - label: cmip7:experiment/abrupt-4xco2-1950        - label: cmip7:experiment/abrupt-4xco2        - label: cmip7:experiment/amip-m4k        - label: cmip7:experiment/amip-p4k-sst-rad        - label: cmip7:experiment/amip-p4k-sst-turb        - label: cmip7:experiment/amip-p4k        - label: cmip7:experiment/amip-piforcing        - label: cmip7:experiment/amip        - label: cmip7:experiment/control-1950        - label: cmip7:experiment/dcppb-forecast-cmip6        - label: cmip7:experiment/esm-flat10-cdr        - label: cmip7:experiment/esm-flat10-zec        - label: cmip7:experiment/esm-flat10        - label: cmip7:experiment/esm-hist        - label: cmip7:experiment/esm-picontrol        - label: cmip7:experiment/esm-scen7-h-aer        - label: cmip7:experiment/esm-scen7-h-aq        - label: cmip7:experiment/esm-scen7-h-ext-os        - label: cmip7:experiment/esm-scen7-h-ext        - label: cmip7:experiment/esm-scen7-h        - label: cmip7:experiment/esm-scen7-l-ext        - label: cmip7:experiment/esm-scen7-l        - label: cmip7:experiment/esm-scen7-m-ext        - label: cmip7:experiment/esm-scen7-m        - label: cmip7:experiment/esm-scen7-ml-ext        - label: cmip7:experiment/esm-scen7-ml        - label: cmip7:experiment/esm-scen7-vlho-aer        - label: cmip7:experiment/esm-scen7-vlho-aq        - label: cmip7:experiment/esm-scen7-vlho-ext        - label: cmip7:experiment/esm-scen7-vlho        - label: cmip7:experiment/esm-scen7-vllo-ext        - label: cmip7:experiment/esm-scen7-vllo        - label: cmip7:experiment/esm-up2p0-gwl2p0        - label: cmip7:experiment/esm-up2p0        - label: cmip7:experiment/g7-1p5k-sai    