name: "Stage 2b: Vertical Computational Grid"
description: Register vertical computational grid (Stage 2b of 4)
title: "[EMD] Stage 2b: Vertical Computational Grid: [do not edit]"
labels: ['emd-submission', 'vertical_computational_grid', 'Review', 'pull_req', 'needs-review']
body:
  - type: markdown
    attributes:
      value: |
        ## Stage 2b: Vertical Computational Grid
        
        Defines the vertical level structure for a model component.
        
        **Prerequisites:** None — can be submitted in parallel with Stage 2a.
        
        > [!NOTE]
        > Please ensure you are familiar with the completion guidance in the collapsible dropdown where it exists. Failure to do so will result in a failed submission.
        > To modify an existing entry, see __[modifying entries](https://github.com/WCRP-CMIP/Essential-Model-Documentation/tree/production?tab=contributing-ov-file#2-modifying-or-reusing-existing-entries)__.
        
        | Step 1: Grid Cell | Step 2: Horizontal Grid / Vertical Grid | Step 3: Model Component | Step 4: Model |
        |:---:|:---:|:---:|:---:|
        | [Grid Cell](https://github.com/WCRP-CMIP/Essential-Model-Documentation/issues/new?template=horizontal_grid_cell.yml) | [Horizontal Grid](https://github.com/WCRP-CMIP/Essential-Model-Documentation/issues/new?template=horizontal_computational_grid.yml) / **🔵 Vertical Grid** | [Model Component](https://github.com/WCRP-CMIP/Essential-Model-Documentation/issues/new?template=model_component.yml) | [Model](https://github.com/WCRP-CMIP/Essential-Model-Documentation/issues/new?template=model.yml) |

  - type: dropdown
    id: vertical_coordinate
    attributes:
      label: Coordinate Type
      description: |
        The vertical coordinate system used to define level positions.
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Coordinate system**
        
        **Atmosphere:**
        - **atmosphere-hybrid-height-coordinate**: Height-based with terrain following near surface
        - **atmosphere-hybrid-sigma-pressure-coordinate**: Pressure-based with terrain following (most common)
        - **atmosphere-sigma-coordinate**: Pure terrain-following
        
        **Ocean:**
        - **depth**: Fixed depth levels (z-coordinate)
        - **ocean-s-coordinate**: Stretched terrain-following
        - **ocean-sigma-coordinate**: Pure terrain-following
        - **ocean-sigma-z-coordinate**: Hybrid sigma near coast, z in deep ocean
        
        **Other:**
        - **height**: Simple height coordinate (ice, snow)
        - **land-ice-sigma-coordinate**: Ice sheet terrain-following
        
        See [CF Conventions](http://cfconventions.org/Data/cf-conventions/cf-conventions-1.10/cf-conventions.html#dimensionless-v-coord) for details.
        
        </details>
      options:
        - "Not specified"
        - "air_potential_temperature"
        - "air_pressure"
        - "atmosphere_hybrid_height_coordinate"
        - "atmosphere_hybrid_sigma_pressure_coordinate"
        - "atmosphere_ln_pressure_coordinate"
        - "atmosphere_sigma_coordinate"
        - "atmosphere_sleve_coordinate"
        - "depth"
        - "geopotential_height"
        - "height"
        - "land_ice_sigma_coordinate"
        - "ocean_double_sigma_coordinate"
        - "ocean_s_coordinate"
        - "ocean_s_coordinate_g1"
        - "ocean_s_coordinate_g2"
        - "ocean_sigma_coordinate"
        - "ocean_sigma_z_coordinate"
        - "sea_water_potential_temperature"
        - "sea_water_pressure"
        - "z*"
      default: 0
    validations:
      required: true

  - type: input
    id: n_z
    attributes:
      label: Number of Levels
      description: |
        The total number of vertical levels in the grid.
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Number of vertical levels**
        
        Total grid cells in vertical.
        
        **Leave blank if:** Number varies (e.g., adaptive snow layers).
        
        </details>
      placeholder: "91"

  - type: input
    id: n_z_range
    attributes:
      label: Number of Levels (range)
      description: |
        The minimum and maximum number of vertical levels where the number varies in time or across the horizontal grid. Only provide if n_z is not set.
      placeholder: "5, 15"

  - type: input
    id: top_layer_thickness
    attributes:
      label: Top Layer Thickness (m)
      description: |
        The thickness of the uppermost layer in metres.
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Uppermost layer thickness** (metres)
        
        Typical values:
        - Atmosphere: 10-100m
        - Ocean surface: 1-10m
        
        Provide nominal value if thickness varies.
        
        </details>
      placeholder: "2.0"

  - type: input
    id: bottom_layer_thickness
    attributes:
      label: Bottom Layer Thickness (m)
      description: |
        The thickness of the lowest layer in metres.
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Lowest layer thickness** (metres)
        
        Typical values:
        - Atmosphere near-surface: 10-50m
        - Deep ocean: 100-500m
        
        **Leave blank if:** Layer is expandable (e.g., ice accumulation).
        
        </details>
      placeholder: "25.0"

  - type: input
    id: total_thickness
    attributes:
      label: Total Thickness (m)
      description: |
        The total vertical extent of the grid in metres.
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Total vertical extent** (metres)
        
        Typical values:
        - Atmosphere: 30,000-85,000m (to stratosphere/mesosphere)
        - Ocean: 5,000-6,000m
        - Soil: 3-15m
        
        Provide nominal value if extent varies spatially.
        
        </details>
      placeholder: "80000"

  - type: textarea
    id: description
    attributes:
      label: Additional Information
      description: |
        Any additional information that may distinguish this specific grid from others with the same properties.
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Additional characterization**
        
        A description is automatically generated from the structured fields above (number of levels, coordinate type, thickness, extent).
        
        Use this field only to add context that distinguishes this grid from others with the same configuration — for example, a non-standard top-of-atmosphere or an unusual layer distribution.
        
        **Leave blank if** the structured fields fully describe the grid.
        
        </details>
      placeholder: "Any additional information that may distinguish this specific grid from others with the same properties. Leave blank if None"

  - type: markdown
    attributes:
      value: |
        ---
        
        ## Issue Handling
        
        **After submission:**
        - Creates `vertical_computational_grid` (v###)
        - Use this ID with a c### in Stage 3 (Model Component)
        - [Track progress in issue comments](https://github.com/WCRP-CMIP/Essential-Model-Documentation/issues?q=is%3Aissue%20author%3A%40me)

  - type: dropdown
    id: issue_kind
    attributes:
      label: Issue Kind
      description: Whether this is a new submission or a modification to an existing entry.
      options:
        - "Modify"
        - "New"
      default: 0
    validations:
      required: true

  - type: input
    id: collaborators
    attributes:
      label: Additional Collaborators
      description: |
        To add attribution to additional members include their GitHub usernames (only) separated by a comma.
      placeholder: "user1,user2,user3,..."
