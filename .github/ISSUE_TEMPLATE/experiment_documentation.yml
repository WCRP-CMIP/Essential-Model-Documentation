name: Experiment Documentation
description: Submit metadata for a CMIP7 experiment configuration.
title: "[EMD] Experiment Documentation"
labels: ['emd-submission', 'experiment']
body:
  - type: markdown
    attributes:
      value: |
        # Document Your Climate Experiment
        
        This form helps you describe a climate experiment - like explaining the rules of a scientific test that climate models will run. Think of it like writing instructions for a recipe that all the world's climate modeling groups will follow to make sure they're all cooking the same dish.
        
        While this isn't required for basic CMIP7 participation like the model documentation, it's really helpful for organizing all the different climate experiments and making sure everyone runs them the same way. It helps coordinate between different research groups and makes sure the scientific results can be properly compared.
        
        The information gets used by modeling groups to understand how to set up and run the experiments, and by scientists to understand what the experiment results mean and how they should be interpreted.

  - type: dropdown
    id: experiment_id
    attributes:
      label: Experiment ID
      description: |
        Select the CMIP7 experiment identifier.
        
        From CMIP7-CVs experiment registry.
      options:
        - "piControl"
        - "historical"
        - "ssp126"
        - "ssp245"
        - "ssp585"
        - "1pctCO2"
        - "abrupt-4xCO2"
    validations:
      required: true

  - type: dropdown
    id: activity
    attributes:
      label: Activity/MIP
      description: |
        Select the primary MIP activity for this experiment.
        
        From CMIP7-CVs activity registry.
      options:
        - "CMIP"
        - "ScenarioMIP"
        - "DAMIP"
        - "AerChemMIP"
        - "C4MIP"
        - "DCPP"
    validations:
      required: true

  - type: dropdown
    id: tier
    attributes:
      label: Experiment Tier
      description: |
        CMIP7 tier classification for this experiment.
        
        - Tier 0: Flagship experiments
        - Tier 1: High priority
        - Tier 2: Standard priority
        - Tier 3: Lower priority
      options:
        - "0"
        - "1"
        - "2"
        - "3"
    validations:
      required: true

  - type: checkboxes
    id: required_model_realms
    attributes:
      label: Required Model Realms
      description: |
        Select the model components/realms that are REQUIRED for this experiment.
        
        From source_type CV - indicates minimum model complexity needed.
      options:
        - label: "AOGCM"
        - label: "AGCM"
        - label: "OGCM"
        - label: "ESM"
        - label: "BGCM"
        - label: "AER"
        - label: "CHEM"

  - type: checkboxes
    id: optional_model_realms
    attributes:
      label: Optional Model Realms
      description: |
        Select the model components/realms that are OPTIONAL for this experiment.
        
        From source_type CV - indicates additional model capabilities that enhance the experiment.
      options:
        - label: "AOGCM"
        - label: "AGCM"
        - label: "OGCM"
        - label: "ESM"
        - label: "BGCM"
        - label: "AER"
        - label: "CHEM"

  - type: input
    id: minimum_years
    attributes:
      label: Minimum Number of Years
      description: |
        Minimum simulation length required for this experiment.
        
        Specified by the MIP protocol.
      placeholder: "e.g., 30, 100, 150"

  - type: input
    id: start_date
    attributes:
      label: Start Date
      description: |
        Standard start date for this experiment (if applicable).
        
        Use YYYY-MM-DD format or 'none' for experiments without fixed start dates.
      placeholder: "e.g., 1850-01-01, 1979-01-01, none"

  - type: input
    id: parent_experiment
    attributes:
      label: Parent Experiment
      description: |
        Parent experiment this branches from (if applicable).
        
        Specify the experiment_id this experiment uses as initial conditions.
      placeholder: "e.g., piControl, historical, none"

  - type: textarea
    id: experiment_description
    attributes:
      label: Experiment Description
      description: |
        Detailed description of the experiment setup and scientific goals.
        
        Include:
        - Forcing conditions and scenarios
        - Scientific objectives and questions
        - Relationship to other experiments
        - Expected outcomes and applications
      placeholder: "Provide a comprehensive description of the experiment configuration, forcing conditions, and scientific objectives."
    validations:
      required: true

  - type: textarea
    id: reference_citation
    attributes:
      label: Primary Reference Citation
      description: |
        Human-readable citation for the primary reference describing this experiment.
        
        Should cite the MIP protocol paper or experiment design document.
      placeholder: "Author(s). (Year). Title. Journal. DOI"
    validations:
      required: true

  - type: input
    id: reference_doi
    attributes:
      label: Primary Reference DOI
      description: |
        DOI for the primary reference describing this experiment.
        
        Typically the MIP protocol or experiment design paper.
      placeholder: "https://doi.org/..."
    validations:
      required: true
