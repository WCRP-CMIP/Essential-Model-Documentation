        - [openifs-48r1 (atmosphere)](https://github.com/WCRP-CMIP/Essential-Model-Documentation/issues/new?template=model_component.yml&title=Model+Component%3A+openifs-48r1&issue_kind=%22New%22&code_base=https%3A%2F%2Fgithub.com%2Fecmwf-ifs%2Fopenifs&component=%22atmosphere%22&description=%2A%2AMain+processes+simulated%2A%2A+OpenIFS+48r1+simulates+the+global+three-dimensional+atmospheric+circulation+together+with+its+interactions+with+the+land+surface%2C+sea+ice+and+ocean+wave+fields.+The+model+integrates+the+hydrostatic+primitive+equations+on+a+terrain-following+mass-based+vertical+coordinate%2C+prognosing+wind%2C+temperature%2C+specific+humidity%2C+cloud+condensate+%28liquid%2C+ice%29%2C+precipitation+species+%28rain%2C+snow%29%2C+cloud+fraction+and+surface+pressure.+Coupled+subsystems+include+the+HTESSEL+land-surface+scheme+%28soil+moisture+and+temperature%2C+vegetation%2C+snow%2C+lakes+via+FLake%29+and+the+WAM+ocean+wave+model.+New+at+this+cycle%2C+OpenIFS+48r1+includes+interactive+prognostic+ozone+and+consolidates+OpenIFS+and+OpenIFS%2FAC+into+a+single+code+base%2C+with+the+operational+CAMS+chemistry+and+aerosol+package+available+by+default.++%2A%2AKey+physics+and+parameterizations%2A%2A+Cycle+48r1+represents+a+major+upgrade+of+the+moist+physics+package%2C+restructuring+the+call+sequence+of+the+turbulence%2C+shallow+and+deep+convection%2C+prognostic+cloud+and+microphysics+schemes+for+greater+physical+consistency.+Notable+changes+include+a+new+deep-convection+closure+with+additional+dependence+on+total+advective+moisture+convergence%3B+a+change+from+exponential%E2%80%93exponential+to+random%E2%80%93exponential+cloud+vertical+overlap%3B+a+vapour-deposition+process+for+falling+ice%3B+and+revised+microphysics+permitting+supercooled+drizzle+drops+to+form+and+only+freeze+on+contact+with+ice%2Fsnow+or+at+much+colder+temperatures%2C+enabling+the+prediction+of+freezing-drizzle+events.+Saturation+adjustment+and+ice+fall+speed+have+been+revised%2C+and+saturation-tendency+perturbations+have+been+removed+from+SPPT+to+suppress+rare+instabilities%2C+while+supersaturation+adjustment+has+been+added+to+ensemble+SPPT+perturbations+with+mass-weighting+and+a+relaxation+timescale.+Radiation+uses+the+ecRad+scheme.+The+HTESSEL+land+surface+is+upgraded+from+a+single-layer+to+a+multi-layer+snow+scheme%2C+markedly+improving+snowpack+realism+and+the+diurnal+cycle+of+2+m+temperature+in+snow-covered+regions.+The+dynamical+core+gains+a+new+vertical+finite-element+discretisation%2C+global+mass+fixers+active+for+all+moist+species+including+water+vapour%2C+a+revised+semi-Lagrangian+iterative+trajectory+solver%2C+and+cubic+semi-Lagrangian+departure-point+interpolation+with+a+3-D+quasi-monotone+limiter+for+cloud+and+precipitation+variables.++%2A%2ANotable+features+of+this+version%2A%2A+Relative+to+the+previous+release+%28OpenIFS+43r3v2%29%2C+48r1+brings%3A+%28i%29+the+major+moist+physics+restructuring%3B+%28ii%29+the+multi-layer+snow+scheme%3B+%28iii%29+interactive+prognostic+ozone%3B+%28iv%29+prediction+of+freezing+drizzle%3B+%28v%29+improved+water+and+energy+conservation+in+the+dynamics%3B+%28vi%29+consolidation+of+OpenIFS+and+OpenIFS%2FAC+into+a+single+code+base+with+operational+CAMS+chemistry+and+aerosol+available+by+default%3B+%28vii%29+a+revised+SPPT+formulation%3B+and+%28viii%29+updated+climate+fields+%28orography%2C+land%E2%80%93sea+mask%2C+lake+depth%2C+glacier+mask%29.+Technical+upgrades+include+migration+from+FCM+to+ecbuild%2Fcmake%2C+a+major+code+restructure%2C+single-+and%2For+double-precision+builds+as+default%2C+inclusion+of+the+Single+Column+Model+%28SCM%29+built+alongside+the+3-D+model%2C+and+the+ifs-test+framework+for+known-good-output+regression+testing.&references=https%3A%2F%2Fdoi.org%2F10.21957%2Fslk503fs2i+https%3A%2F%2Fdoi.org%2F10.1175%2FJAS-D-13-0163.1+https%3A%2F%2Fdoi.org%2F10.1002%2Fqj.713+https%3A%2F%2Fdoi.org%2F10.1175%2F2008JHM1068.1+https%3A%2F%2Fdoi.org%2F10.1029%2F2019MS001725+https%3A%2F%2Fdoi.org%2F10.1175%2FMWR-D-18-0043.1+https%3A%2F%2Fdoi.org%2F10.1256%2Fqj.03.173+https%3A%2F%2Fdoi.org%2F10.21957%2F02054f0fbf&family=%22ifs%22)
        - [um7.3 (atmosphere)](https://github.com/WCRP-CMIP/Essential-Model-Documentation/issues/new?template=model_component.yml&title=Model+Component%3A+um7.3&issue_kind=%22New%22&code_base=private&component=%22atmosphere%22&description=The+model+represents+atmospheric+circulation+and+includes+submodels+for+radiation%2C+cloud+microphysics%2C+convection+and+boundary+layer+processes.+The+atmosphere+configuration+is+as+used+for+ACCESS-ESM1.5+%28Ziehn+et+al.%2C+2020%29+with+a+minor+change+to+convective+momentum+transport+and+is+similar+to+the+atmosphere+configuration+of+HADGEM2+%28r1.0%29+%28The+HadGEM2+Development+Team%2C+2011+%29+but+with+the+PC2+cloud+scheme+as+for+HADGEM2+%28r1.1%29+%28Hewitt+et+al%2C+2011%29.&references=https%3A%2F%2Fdoi.org%2F10.1071%2FES19035+https%3A%2F%2Fdoi.org%2F10.5194%2Fgmd-4-723-2011+https%3A%2F%2Fdoi.org%2F10.5194%2Fgmd-4-223-2011&family=%22hadam%22)
        
