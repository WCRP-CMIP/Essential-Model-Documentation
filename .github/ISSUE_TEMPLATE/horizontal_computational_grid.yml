name: "Stage 2a: Horizontal Computational Grid"
description: Register horizontal computational grid (Stage 2a of 4)
title: "[EMD] Stage 2a: Horizontal Computational Grid: [do not edit]"
labels: ['emd-submission', 'horizontal_computational_grid', 'Review', 'pull_req', 'needs-review']
body:
  - type: markdown
    attributes:
      value: |
        ## Stage 2a: Horizontal Computational Grid
        
        Links subgrids into a single computational grid with a specified staggering arrangement.
        
        **Prerequisites:** Subgrid IDs (s###) from Stage 1.
        
        > [!NOTE]
        > Please ensure you are familiar with the completion guidance in the collapsible dropdown where it exists. Failure to do so will result in a failed submission.
        > To modify an existing entry, see __[modifying entries](https://github.com/WCRP-CMIP/Essential-Model-Documentation/tree/production?tab=contributing-ov-file#2-modifying-or-reusing-existing-entries)__.
        
        | Step 1: Grid Cell | Step 2: Horizontal Grid / Vertical Grid | Step 3: Model Component | Step 4: Model |
        |:---:|:---:|:---:|:---:|
        | [Grid Cell](https://github.com/WCRP-CMIP/Essential-Model-Documentation/issues/new?template=horizontal_grid_cell.yml) | **🔵 Horizontal Grid** / [Vertical Grid](https://github.com/WCRP-CMIP/Essential-Model-Documentation/issues/new?template=vertical_computational_grid.yml) | [Model Component](https://github.com/WCRP-CMIP/Essential-Model-Documentation/issues/new?template=model_component.yml) | [Model](https://github.com/WCRP-CMIP/Essential-Model-Documentation/issues/new?template=model.yml) |

  - type: dropdown
    id: arrangement
    attributes:
      label: Arrangement
      description: |
        The grid staggering pattern that defines how variables are positioned relative to cell centres.
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Grid staggering pattern**
        
        Defines relative positions of mass and velocity variables.
        
        - **arakawa-a / unstaggered**: All variables at same location
        - **arakawa-b**: Velocities at cell corners
        - **arakawa-c**: U at east/west edges, V at north/south edges (common for ocean)
        - **arakawa-d**: U at north/south edges, V at east/west edges
        - **arakawa-e**: Mass at edge midpoints
        
        **Number of subgrids needed:**
        - Unstaggered/A: 1 subgrid
        - B: 2 subgrids (mass + corner velocity)
        - C/D: 2-3 subgrids (mass + edge velocities)
        
        </details>
      options:
        - "Not specified"
        - "arakawa-a"
        - "arakawa-b"
        - "arakawa-c"
        - "arakawa-d"
        - "arakawa-e"
      default: 0
    validations:
      required: true

  - type: dropdown
    id: horizontal_subgrids
    attributes:
      multiple: true
      label: Subgrid IDs
      description: |
        The subgrid IDs from Stage 1 that make up this computational grid. **Select multiple.**
        
        <details markdown="1">
        <summary>Detailed Guidance</summary>
        
        **Subgrid references**
        
        List the s### IDs from Stage 1.
        
        **Format:** One ID per line
        
        **Example for Arakawa-C:**
        ```
        s100
        s101
        ```
        Where s100 = mass variables, s101 = velocity variables.
        
        Number of subgrids must match your arrangement type.
        
        </details>
      options:
        - "s100"
        - "s101"
        - "s102"
        - "s103"
        - "s104"
        - "s105"
        - "s106"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        
        ## Subgrid Configurations
        
        Alternatively, define subgrids inline by specifying grid cells and variable types for each slot.
        
        <details>
        <summary>What are subgrids?</summary>
        
        A **horizontal subgrid** describes the grid cells at one of the stagger positions of a horizontal computational grid. 
        
        **Cell Variable Types** define what variables are stored at cells:
        - **mass**: Mass-related variables (temperature, pressure, tracers)
        - **x_velocity**: X-component velocity and related fluxes
        - **y_velocity**: Y-component velocity and related fluxes  
        - **velocity**: Velocity vector when not partitioned (unstructured grids)
        
        For staggered grids (Arakawa B/C/D/E), multiple subgrids with different variable types are needed.
        
        </details>
        
        ---
        
        ### Subgrid Slot 1

  - type: dropdown
    id: horizontal_grid_cells_1
    attributes:
      label: Grid Cells (select or define horizontal grid cells for this subgrid)
      options:
        - "Not specified"
        - "g100"
        - "g101"
        - "g102"
        - "g103"
        - "g104"
        - "g105"
        - "g106"
        - "g107"
        - "g108"
        - "g109"
        - "g110"
      default: 0
    validations:
