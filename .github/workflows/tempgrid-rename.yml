name: ⟳ Rename tempgrid files on PR merge

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write

on:
  pull_request:
    types:
      - closed
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Process only this PR (leave blank to scan ALL tempgrid files on src-data)'
        required: false
        type: string
      files:
        description: 'Space-separated tempgrid file paths (overrides discovery)'
        required: false
        type: string
  schedule:
    - cron: '0 4 * * *'  # daily at 6am UTC

jobs:
  rename_tempgrid:
    if: >
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true) ||
      github.event_name == 'workflow_dispatch'

    runs-on: ubuntu-latest
    concurrency:
      group: tempgrid-rename
      cancel-in-progress: true

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      EVENT_PR: ${{ github.event.pull_request.number }}
      MANUAL_PR_NUMBER: ${{ github.event.inputs.pr_number }}
      MANUAL_FILES: ${{ github.event.inputs.files }}

    steps:
      - name: Checkout src-data branch
        uses: actions/checkout@v4
        with:
          ref: src-data
          fetch-depth: 0

      - name: Fetch integration refs
        run: |
          git fetch origin production:refs/remotes/origin/production 2>/dev/null || true
          git fetch origin main:refs/remotes/origin/main 2>/dev/null || true

      - name: Configure Git
        run: |
          git config user.name  "cmip-ipo"
          git config user.email "actions@wcrp-cmip.org"

      - name: Discover tempgrid files
        id: discover
        run: |
          if [ -n "$MANUAL_FILES" ]; then
            echo "Mode: explicit file list"
            FILES=$(echo "$MANUAL_FILES" | tr ' ' '\n' | grep -E 'tempgrid' || true)
          elif [ -n "$MANUAL_PR_NUMBER" ] || [ -n "$EVENT_PR" ]; then
            PR="${MANUAL_PR_NUMBER:-$EVENT_PR}"
            echo "Mode: single PR #$PR"
            FILES=$(gh pr view "$PR" --repo "$REPO" \
              --json files --jq '.files[].path' 2>/dev/null \
              | grep -E '(^|/)([^/]*tempgrid[^/]*)$' || true)
          else
            echo "Mode: scan ALL tempgrid files on src-data"
            FILES=$(find horizontal_grid_cell horizontal_computational_grid vertical_computational_grid \
              -maxdepth 1 -name 'tempgrid*.json' 2>/dev/null | sort || true)
          fi

          EXISTING=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if [ -f "$f" ]; then
              EXISTING="${EXISTING}${f}"$'\n'
            else
              echo "  SKIP (not present on src-data): $f"
            fi
          done <<< "$FILES"
          FILES=$(printf "%s" "$EXISTING" | grep . || true)

          echo "Files to process:"
          echo "$FILES"
          {
            echo "files<<FILES_EOF"
            echo "$FILES"
            echo "FILES_EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Process tempgrid files
        id: rename
        run: |
          FILES="${{ steps.discover.outputs.files }}"
          MAPPING_JSON=""

          echo "## ⟳ Tempgrid rename summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Original | Renamed to | PR | Issue | Authors |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|---|---|" >> "$GITHUB_STEP_SUMMARY"

          if [ -z "$FILES" ]; then
            echo "No tempgrid files found."
            echo "| _(none)_ | – | – | – | – |" >> "$GITHUB_STEP_SUMMARY"
            echo "mapping_json=[]" >> "$GITHUB_OUTPUT"
          else
          while IFS= read -r filepath; do
            [ -z "$filepath" ] && continue
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Processing: $filepath"
            dir=$(dirname "$filepath")

            # Commit that ADDED this exact path (no --follow: avoids jumping
            # rename chains into unrelated files).
            INTRO_COMMIT=$(git log --all --diff-filter=A \
              --pretty=format:"%H" -- "$filepath" 2>/dev/null | tail -1)

            # PR merge commit records 'Merge pull request #M from OWNER/issue_N_...'.
            # Try whichever integration ref is present; take the FIRST such merge.
            MERGE_MSG=""
            if [ -n "$INTRO_COMMIT" ]; then
              for tgt in origin/production production HEAD origin/main main; do
                git rev-parse --verify "$tgt" >/dev/null 2>&1 || continue
                MERGE_MSG=$(git log --merges --ancestry-path --reverse \
                  --pretty=format:"%s" "${INTRO_COMMIT}..${tgt}" 2>/dev/null \
                  | grep -i 'pull request' | head -1)
                [ -n "$MERGE_MSG" ] && break
              done
            fi
            PR_NUM=$(echo "$MERGE_MSG"  | grep -oE 'pull request #[0-9]+' | grep -oE '[0-9]+' | head -1)
            ISSUE_NUM=$(echo "$MERGE_MSG" | grep -oE 'issue_[0-9]+' | grep -oE '[0-9]+' | head -1)
            echo "  PR: ${PR_NUM:-?}  Issue: ${ISSUE_NUM:-?}  (merge: ${MERGE_MSG:-none})"

            # Authors: ONLY from the commit that added this file (full history
            # would pull in bulk automated commits whose Co-authored-by trailers
            # belong to OTHER grids). Plus the PR author if resolvable.
            AUTHORS_FILE=$(mktemp)
            if [ -n "$INTRO_COMMIT" ]; then
              git show -s --format="%an <%ae>" "$INTRO_COMMIT" >> "$AUTHORS_FILE" || true
              git show -s --format="%B" "$INTRO_COMMIT" \
                | grep -oE 'Co-authored-by: [A-Za-z0-9 _.-]+ <[A-Za-z0-9._%+!-]+@[A-Za-z0-9.-]+>' \
                | sed 's/Co-authored-by: //' >> "$AUTHORS_FILE" || true
            fi
            if [ -n "$PR_NUM" ]; then
              PR_LOGIN=$(gh pr view "$PR_NUM" --repo "$REPO" --json author --jq '.author.login' 2>/dev/null || true)
              if [ -n "$PR_LOGIN" ] && ! echo "$PR_LOGIN" | grep -qE '(\[bot\]|^app/|-bot$)'; then
                PR_NAME=$(gh api "users/$PR_LOGIN" --jq '.name // .login' 2>/dev/null || true)
                echo "$PR_NAME" | grep -qE '^[A-Za-z0-9 _.@-]+$' && \
                  echo "${PR_NAME} <${PR_LOGIN}@users.noreply.github.com>" >> "$AUTHORS_FILE"
              fi
            fi
            AUTHOR_NAMES=$(sort -u "$AUTHORS_FILE" \
              | grep -viE '(cmip-ipo|github-actions|\[bot\]|noreply@github\.com|^no response)' \
              | grep -E '^[A-Za-z0-9]' | sed 's/ <.*//' | paste -sd ', ')
            rm -f "$AUTHORS_FILE"

            LAST_MSG=$(git log -1 --format="%s" -- "$filepath" 2>/dev/null || true)
            OLD_ID=$(basename "$filepath" .json)
            LAST_MSG_JSON=$(echo "$LAST_MSG" | jq -Rs .)

            # Duplicate check against existing numbered files
            JQ_STRIP='del(.["@id"], .["@type"], .validation_key, .ui_label, .alias) | to_entries | sort_by(.key) | from_entries'
            CANDIDATE_SIG=$(jq -c "$JQ_STRIP" "$filepath")
            EXISTING_ID=""
            for existing in "$dir"/[gGhHvVsS][0-9]*.json; do
              [ -e "$existing" ] || continue
              if [ "$(jq -c "$JQ_STRIP" "$existing")" = "$CANDIDATE_SIG" ]; then
                EXISTING_ID=$(basename "$existing" .json); break
              fi
            done

            if [ -n "$EXISTING_ID" ]; then
              echo "  DUPLICATE of $EXISTING_ID — removing tempgrid"
              git rm "$filepath"
              echo "| \`$OLD_ID\` | dup of \`$EXISTING_ID\` | #${PR_NUM:-?} | #${ISSUE_NUM:-?} | $AUTHOR_NAMES |" >> "$GITHUB_STEP_SUMMARY"
              [ -n "$MAPPING_JSON" ] && MAPPING_JSON="${MAPPING_JSON},"
              MAPPING_JSON="${MAPPING_JSON}{\"old\":\"${filepath}\",\"new_id\":\"${EXISTING_ID}\",\"old_id\":\"${OLD_ID}\",\"pr\":\"${PR_NUM}\",\"issue\":\"${ISSUE_NUM}\",\"authors\":\"${AUTHOR_NAMES}\",\"last_msg\":${LAST_MSG_JSON},\"duplicate\":true}"
              continue
            fi

            # Next sequential ID
            LETTER=""; MAX_NUM=-1
            for existing in "$dir"/[sghvSGHV]*[0-9].json; do
              [ -e "$existing" ] || continue
              base=$(basename "$existing" .json)
              if [[ "$base" =~ ^([sghvSGHV])([0-9]+)$ ]]; then
                L="${BASH_REMATCH[1],,}"; NUM=$((10#${BASH_REMATCH[2]}))
                [ -z "$LETTER" ] && LETTER="$L"
                [ $NUM -gt $MAX_NUM ] && MAX_NUM=$NUM
              fi
            done
            if [ -z "$LETTER" ]; then
              echo "  SKIP: no numbered files in $dir"
              echo "| \`$OLD_ID\` | skipped | #${PR_NUM:-?} | #${ISSUE_NUM:-?} | – |" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi
            NEW_ID=$(printf "%s%03d" "$LETTER" $((MAX_NUM + 1)))
            NEW_PATH="$dir/${NEW_ID}.json"

            echo "  Renaming $OLD_ID -> $NEW_ID"
            git mv "$filepath" "$NEW_PATH"
            tmp=$(mktemp)
            jq --arg old "$OLD_ID" --arg new "$NEW_ID" '
              .["@id"] = $new | .["validation_key"] = $new
              | walk(if type == "string" and . == $old then $new else . end)
            ' "$NEW_PATH" > "$tmp" && mv "$tmp" "$NEW_PATH" || rm -f "$tmp"

            echo "| \`$OLD_ID\` | \`$NEW_ID\` | #${PR_NUM:-?} | #${ISSUE_NUM:-?} | $AUTHOR_NAMES |" >> "$GITHUB_STEP_SUMMARY"
            [ -n "$MAPPING_JSON" ] && MAPPING_JSON="${MAPPING_JSON},"
            MAPPING_JSON="${MAPPING_JSON}{\"old\":\"${filepath}\",\"new\":\"${NEW_PATH}\",\"new_id\":\"${NEW_ID}\",\"old_id\":\"${OLD_ID}\",\"pr\":\"${PR_NUM}\",\"issue\":\"${ISSUE_NUM}\",\"authors\":\"${AUTHOR_NAMES}\",\"last_msg\":${LAST_MSG_JSON}}"
          done <<< "$FILES"
          echo "mapping_json=[${MAPPING_JSON}]" >> "$GITHUB_OUTPUT"
          fi
      - name: Commit renames to src-data
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit."; exit 0
          fi
          git commit -m "Rename tempgrid files with sequential ids [auto]"
          git push origin src-data

      - name: Cancel and retrigger src-data-change
        if: ${{ !cancelled() }}
        run: |
          RUNS=$(gh run list --repo "$REPO" -w src-data-change.yml \
            --status in_progress --json databaseId --jq '.[].databaseId')
          for run_id in $RUNS; do gh run cancel "$run_id" --repo "$REPO" || true; done
          gh workflow run src-data-change.yml --repo "$REPO" --ref src-data

      - name: Update PRs and linked issues
        if: ${{ !cancelled() }}
        env:
          MAPPING_JSON: ${{ steps.rename.outputs.mapping_json }}
        run: |
          if [ -z "$MAPPING_JSON" ] || [ "$MAPPING_JSON" = "[]" ]; then
            echo "Nothing to update."; exit 0
          fi

          PRS=$(echo "$MAPPING_JSON" | jq -r '[.[].pr] | unique | .[]')

          for PR in $PRS; do
            [ -z "$PR" ] && continue
            echo "━━━ PR #$PR ━━━"

            SUBSET=$(echo "$MAPPING_JSON" | jq --arg pr "$PR" '[.[] | select(.pr == $pr)]')
            NEW_IDS=$(echo "$SUBSET" | jq -r '[.[].new_id] | unique | join(", ")')
            HAS_DUPS=$(echo "$SUBSET" | jq '[.[] | select(.duplicate == true)] | length')
            HAS_NEW=$(echo "$SUBSET"  | jq '[.[] | select(.duplicate != true)] | length')
            TABLE_ROWS=$(echo "$SUBSET" | jq -r '.[] |
              if .duplicate then "| `\(.old_id)` | ⚠️ duplicate of `\(.new_id)` | \(.authors) |"
              else "| `\(.old_id)` | `\(.new_id)` | \(.authors) |" end')

            BODY_FILE=$(mktemp)
            if [ "$HAS_NEW" -gt 0 ]; then echo "## Grid IDs assigned" >> "$BODY_FILE"
            else echo "## Duplicate grid detected" >> "$BODY_FILE"; fi
            echo "" >> "$BODY_FILE"
            if [ "$HAS_DUPS" -gt 0 ]; then
              echo "> [!WARNING]" >> "$BODY_FILE"
              echo "> One or more submitted grids are identical to an existing entry (ignoring ID fields). The existing ID has been used — no new entry was created." >> "$BODY_FILE"
              echo "" >> "$BODY_FILE"
            fi
            if [ "$HAS_NEW" -gt 0 ]; then
              echo "Temporary grid files renamed to permanent sequential IDs on \`src-data\`." >> "$BODY_FILE"
              echo "" >> "$BODY_FILE"
            fi
            echo "| Temporary ID | Result | Authors |" >> "$BODY_FILE"
            echo "|---|---|---|" >> "$BODY_FILE"
            printf "%s\n" "$TABLE_ROWS" >> "$BODY_FILE"
            echo "" >> "$BODY_FILE"
            echo "> Use the permanent ID in subsequent registration steps." >> "$BODY_FILE"
            COMMENT_BODY=$(cat "$BODY_FILE"); rm -f "$BODY_FILE"

            OLD_PR_TITLE=$(gh pr view "$PR" --repo "$REPO" --json title --jq '.title' 2>/dev/null || true)
            if [ -n "$OLD_PR_TITLE" ]; then
              CLEAN=$(echo "$OLD_PR_TITLE" | sed 's/^|[^|]*| *//')
              NEW_PR_TITLE="| ${NEW_IDS} | ${CLEAN}"
              [ "$OLD_PR_TITLE" != "$NEW_PR_TITLE" ] && gh pr edit "$PR" --repo "$REPO" --title "$NEW_PR_TITLE" || true
              gh pr comment "$PR" --repo "$REPO" --body "$COMMENT_BODY" || true
            fi

            ISSUES=$(echo "$SUBSET" | jq -r '[.[].issue] | unique | .[]' | grep -E '^[0-9]+$' || true)
            BODY_ISSUES=$(gh pr view "$PR" --repo "$REPO" --json body --jq '.body' 2>/dev/null \
              | tr '\n' ' ' | grep -oiE '(Resolves|Fixes|Closes)[[:space:]]+#[0-9]+' \
              | grep -oE '[0-9]+' || true)
            ALL_ISSUES=$(printf "%s\n%s\n" "$ISSUES" "$BODY_ISSUES" | grep -E '^[0-9]+$' | sort -u)

            for issue_num in $ALL_ISSUES; do
              [ -z "$issue_num" ] && continue
              gh issue comment "$issue_num" --repo "$REPO" --body "$COMMENT_BODY" || true
              OLD_IT=$(gh issue view "$issue_num" --repo "$REPO" --json title --jq '.title' 2>/dev/null || true)
              if [ -n "$OLD_IT" ]; then
                CLEAN_IT=$(echo "$OLD_IT" | sed 's/^|[^|]*| *//')
                NEW_IT="| ${NEW_IDS} | ${CLEAN_IT}"
                [ "$OLD_IT" != "$NEW_IT" ] && gh issue edit "$issue_num" --repo "$REPO" --title "$NEW_IT" || true
              fi
              gh issue close "$issue_num" --repo "$REPO" || true
              echo "  issue #$issue_num updated + closed"
            done

            BRANCH=$(gh pr view "$PR" --repo "$REPO" --json headRefName --jq '.headRefName' 2>/dev/null || true)
            if [ -n "$BRANCH" ]; then
              gh api -X DELETE "repos/$REPO/git/refs/heads/$BRANCH" 2>/dev/null \
                && echo "  deleted branch $BRANCH" || echo "  branch $BRANCH already gone"
            fi
          done

  # ── Stamp | name | on PR/issue titles for model, model_family, model_component ──
  # Runs only on real PR merges (not schedule/dispatch) where no tempgrid files
  # were involved. Extracts the name from the issue title:
  #   "<type_label> : <name>"  →  "| <name> | <original title>"
  stamp_named_types:
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true
    needs: rename_tempgrid
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO:     ${{ github.repository }}
      PR:       ${{ github.event.pull_request.number }}

    steps:
      - name: Check for tempgrid files in this PR
        id: check_tempgrid
        run: |
          HAS_TEMPGRID=$(gh pr view "$PR" --repo "$REPO" \
            --json files --jq '.files[].path' 2>/dev/null \
            | grep -cE '(^|/)([^/]*tempgrid[^/]*)$' || echo 0)
          echo "has_tempgrid=$HAS_TEMPGRID" >> "$GITHUB_OUTPUT"
          echo "Tempgrid files in PR: $HAS_TEMPGRID"

      - name: Stamp issue and PR titles
        if: steps.check_tempgrid.outputs.has_tempgrid == '0'
        run: |
          NAMED_TYPES="model model_family model_component"

          # Collect all issues linked to this PR (from PR body Closes/Fixes/Resolves)
          ALL_ISSUES=$(gh pr view "$PR" --repo "$REPO" --json body --jq '.body' 2>/dev/null \
            | tr '\n' ' ' \
            | grep -oiE '(Resolves|Fixes|Closes)[[:space:]]+#[0-9]+' \
            | grep -oE '[0-9]+' || true)

          for ISSUE_NUM in $ALL_ISSUES; do
            [ -z "$ISSUE_NUM" ] && continue

            ISSUE_TITLE=$(gh issue view "$ISSUE_NUM" --repo "$REPO" \
              --json title --jq '.title' 2>/dev/null || true)
            [ -z "$ISSUE_TITLE" ] && continue

            # Skip if already stamped
            if echo "$ISSUE_TITLE" | grep -qE '^\|'; then
              echo "Issue #$ISSUE_NUM already stamped — skipping."
              continue
            fi

            # Check title matches "<type> : <name>" (case-insensitive)
            MATCHED=false
            for TYPE in $NAMED_TYPES; do
              if echo "$ISSUE_TITLE" | grep -qiE "^${TYPE}\s*:"; then
                MATCHED=true; break
              fi
            done
            if [ "$MATCHED" = "false" ]; then
              echo "Issue #$ISSUE_NUM title does not match a named type — skipping."
              continue
            fi

            # Extract name: everything after the first ':'
            NAME=$(echo "$ISSUE_TITLE" | sed 's/^[^:]*:[[:space:]]*//' | xargs)
            if [ -z "$NAME" ]; then
              echo "Issue #$ISSUE_NUM: could not extract name from title — skipping."
              continue
            fi

            echo "Issue #$ISSUE_NUM: stamping | $NAME |"

            NEW_ISSUE_TITLE="| ${NAME} | ${ISSUE_TITLE}"
            gh issue edit "$ISSUE_NUM" --repo "$REPO" --title "$NEW_ISSUE_TITLE" || true
            gh issue close "$ISSUE_NUM" --repo "$REPO" || true

            OLD_PR_TITLE=$(gh pr view "$PR" --repo "$REPO" --json title --jq '.title' 2>/dev/null || true)
            if [ -n "$OLD_PR_TITLE" ]; then
              CLEAN_PR=$(echo "$OLD_PR_TITLE" | sed 's/^|[^|]*| *//')
              NEW_PR_TITLE="| ${NAME} | ${CLEAN_PR}"
              [ "$OLD_PR_TITLE" != "$NEW_PR_TITLE" ] && \
                gh pr edit "$PR" --repo "$REPO" --title "$NEW_PR_TITLE" || true
            fi

            echo "  ✓ Issue #$ISSUE_NUM and PR #$PR stamped with | $NAME |" >> "$GITHUB_STEP_SUMMARY"
          done
