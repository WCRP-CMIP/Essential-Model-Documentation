name: ⟳ Rename tempgrid files on PR merge
description: |
  On merge of a PR labelled 'pull_req', find any files containing 'tempgrid'
  in their name, determine the next available (s|g|h)NNN id in that folder,
  rename the file accordingly, commit to src-data, then comment on the PR
  (and any linked issue) with the full rename mapping.

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write

on:
  pull_request:
    types:
      - closed
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull Request number to process (for manual trigger)'
        required: false
        type: string

jobs:
  rename_tempgrid:
    # Only run when the PR was actually merged AND carries the 'pull_req' label
    # OR when manually triggered with a PR number
    if: >
      (github.event_name == 'pull_request' && 
       github.event.pull_request.merged == true &&
       contains(
         toJSON(github.event.pull_request.labels.*.name),
         'pull_req'
       )) ||
      github.event_name == 'workflow_dispatch'

    runs-on: ubuntu-latest
    
    env:
      MANUAL_PR_NUMBER: ${{ github.event.inputs.pr_number }}

    steps:
      # ── 1. Check out the src-data branch (where vocab files live) ─────────
      - name: Checkout src-data branch
        uses: actions/checkout@v4
        with:
          ref: src-data
          fetch-depth: 0

      - name: Set PR number
        id: set_pr
        run: |
          if [ -z "$MANUAL_PR_NUMBER" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"
          else
            PR_NUM="$MANUAL_PR_NUMBER"
          fi
          echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "Using PR #$PR_NUM"

      - name: Configure Git
        run: |
          git config user.name  "cmip-ipo"
          git config user.email "actions@wcrp-cmip.org"

      # ── 2. Find every file that was added in this PR ──────────────────────
      #    We diff the merge commit against its first parent to get only the
      #    files that arrived via the PR, then filter for 'tempgrid' in the name.
      - name: Identify added tempgrid files
        id: find_tempgrid
        run: |
          # The merge commit on src-data is HEAD; its first parent is what
          # src-data looked like before the merge.
          ADDED=$(git diff --name-only --diff-filter=A HEAD^1 HEAD 2>/dev/null || true)

          echo "All added files:"
          echo "$ADDED"

          TEMPGRID=$(echo "$ADDED" | grep -E '(^|/)([^/]*tempgrid[^/]*)$' || true)

          echo "Tempgrid files:"
          echo "$TEMPGRID"

          # Store as newline-separated list in an output (safe for the next step)
          # Use a heredoc so multiline content survives
          {
            echo "tempgrid_files<<EOF"
            echo "$TEMPGRID"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ── 3. Rename each tempgrid file to the next available id ─────────────
      - name: Rename tempgrid files
        id: rename
        run: |
          MAPPING_MD=""   # accumulate markdown table rows
          MAPPING_JSON="" # accumulate JSON array entries (for later comment)

          FILES="${{ steps.find_tempgrid.outputs.tempgrid_files }}"

          echo "## ⟳ Tempgrid rename summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Original filename | Renamed to |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"

          if [ -z "$FILES" ]; then
            echo "No tempgrid files found – nothing to do."
            echo "| _(none)_ | – |" >> "$GITHUB_STEP_SUMMARY"
            echo "mapping_md=" >> "$GITHUB_OUTPUT"
            echo "mapping_json=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          while IFS= read -r filepath; do
            [ -z "$filepath" ] && continue

            dir=$(dirname "$filepath")
            filename=$(basename "$filepath")

            echo "Processing: $filepath  (dir=$dir)"

            # ── Determine the letter prefix used in this folder ──────────────
            # Glob directly for (s|g|h) followed by one-or-more digits, .json
            LETTER=""
            MAX_NUM=-1

            for existing in "$dir"/[sghSGH]*[0-9].json; do
              # Skip if glob found nothing
              [ -e "$existing" ] || continue
              base=$(basename "$existing" .json)
              # Must be exactly letter + digits (no other chars)
              if [[ "$base" =~ ^([sghSGH])([0-9]+)$ ]]; then
                L="${BASH_REMATCH[1],,}"   # lowercase
                N="${BASH_REMATCH[2]}"
                NUM=$((10#$N))             # strip leading zeros → decimal
                if [ -z "$LETTER" ]; then
                  LETTER="$L"
                fi
                if [ $NUM -gt $MAX_NUM ]; then
                  MAX_NUM=$NUM
                fi
              fi
            done

            # If the folder has no existing numbered files, skip and log
            if [ -z "$LETTER" ]; then
              echo "  SKIP: no existing (s|g|h)NNN.json files found in $dir"
              echo "| \`${filepath}\` | ⚠️ skipped – no existing numbered files in \`${dir}\` |" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            # Next id = MAX_NUM + 1
            NEXT_NUM=$(( MAX_NUM + 1 ))

            # Zero-pad to 3 digits
            NEW_NAME=$(printf "%s%03d.json" "$LETTER" "$NEXT_NUM")
            NEW_PATH="$dir/$NEW_NAME"

            echo "  Renaming  $filepath  →  $NEW_PATH"
            git mv "$filepath" "$NEW_PATH"
            echo "| \`${filepath}\` | \`${NEW_PATH}\` |" >> "$GITHUB_STEP_SUMMARY"

            # Build mapping entries
            MAPPING_MD="${MAPPING_MD}| \`${filepath}\` | \`${NEW_PATH}\` |\n"
            if [ -n "$MAPPING_JSON" ]; then
              MAPPING_JSON="${MAPPING_JSON},"
            fi
            MAPPING_JSON="${MAPPING_JSON}{\"old\":\"${filepath}\",\"new\":\"${NEW_PATH}\"}"

          done <<< "$FILES"

          # Write outputs
          {
            echo "mapping_md<<EOF"
            printf "%b" "$MAPPING_MD"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "mapping_json=[${MAPPING_JSON}]" >> "$GITHUB_OUTPUT"

      # ── 3b. Update @id field in renamed JSON files ────
      - name: Update @id field in renamed JSON files
        if: steps.rename.outputs.mapping_json != '[]'
        run: |
          MAPPING_JSON='${{ steps.rename.outputs.mapping_json }}'
          
          echo "Processing JSON @id fields with mapping: $MAPPING_JSON"
          
          echo "$MAPPING_JSON" | jq -r '.[] | "\(.old)|\(.new)"' | while IFS='|' read -r old_path new_path; do
            [ -z "$old_path" ] || [ -z "$new_path" ] && continue
            
            old_base=$(basename "$old_path" .json)
            new_base=$(basename "$new_path" .json)
            
            echo "Updating @id in: $new_path"
            echo "  Replacing: '$old_base' → '$new_base'"
            
            # Use Perl to replace @id field value(s)
            perl -pi -e "s/(\"\@id\"\s*:\s*\")[^\"]*tempgrid[^\"]*(\")/$1$ENV{new_base}$2/g" "$new_path" 2>/dev/null || true
            
            # Fallback: also replace validation_key field
            perl -pi -e "s/(\"\validation_key\"\s*:\s*\")[^\"]*tempgrid[^\"]*(\")/$1$ENV{new_base}$2/g" "$new_path" 2>/dev/null || true
            
            # And any other field containing the old tempgrid name
            perl -pi -e "s/$old_base/$new_base/g" "$new_path"
            
            # Verify the change
            if grep -q "$new_base" "$new_path"; then
              echo "✅ Successfully updated $new_path"
            else
              echo "⚠️ Warning: Could not verify update in $new_path"
            fi
          done

      # ── 4. Cancel any running src-data-change workflows ───────────────────
      - name: Cancel running src-data-change workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          WORKFLOW_RUNS=$(gh run list --repo "$REPO" -w src-data-change.yml --status in_progress --json databaseId --jq '.[].databaseId')
          
          if [ -n "$WORKFLOW_RUNS" ]; then
            echo "Cancelling running src-data-change workflows..."
            while IFS= read -r run_id; do
              [ -z "$run_id" ] && continue
              echo "Cancelling run #$run_id"
              gh run cancel "$run_id" --repo "$REPO"
            done <<< "$WORKFLOW_RUNS"
          else
            echo "No running src-data-change workflows found."
          fi

      # ── 5. Commit renamed files to src-data ───────────────────────────────
      - name: Commit renames to src-data
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit (no tempgrid renames were needed)."
          else
            git commit -m "Auto-rename tempgrid files with sequential ids"
            git push origin src-data
            echo "## Tempgrid renames committed to src-data" >> "$GITHUB_STEP_SUMMARY"
          fi

      # ── 6. Trigger src-data-change workflow after rename commit ──────────
      - name: Trigger src-data-change workflow
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "Triggering src-data-change workflow after rename commit..."
          gh workflow run src-data-change.yml --repo "$REPO" --ref src-data

      # ── 5. Post a comment on the PR (and any linked issues) ───────────────
      - name: Comment on PR and close linked issues
        if: steps.rename.outputs.mapping_json != '[]'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.set_pr.outputs.pr_number }}
          REPO: ${{ github.repository }}
          MAPPING_MD: ${{ steps.rename.outputs.mapping_md }}
          MAPPING_JSON: ${{ steps.rename.outputs.mapping_json }}
        run: |
          # ── Build the comment body ─────────────────────────────────────────
          COMMENT_BODY="## ⟳ Tempgrid file rename summary

          The following temporary grid files were automatically renamed to their
          permanent sequential identifiers and committed to the \`src-data\` branch.

          | Original filename | Renamed to |
          |---|---|
          ${MAPPING_MD}

          > Renames are based on the next available \`(s|g|h)NNN\` id in each folder."

          # ── Comment on the PR ──────────────────────────────────────────────
          gh pr comment "$PR_NUMBER" \
            --repo "$REPO" \
            --body "$COMMENT_BODY"

          echo "✅ Commented on PR #${PR_NUMBER}"

          # ── Find and close linked issues by parsing PR description ────────
          # Extract issue numbers from "Resolves #NNN" / "Fixes #NNN" / "Closes #NNN"
          # Use tr to handle newlines in PR body
          ISSUE_NUMBERS=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body --jq '.body' | \
            tr '\n' ' ' | \
            grep -oE '[Rr]esolves?[^#]*#[0-9]+' | \
            grep -oE '#[0-9]+' | \
            grep -oE '[0-9]+' || true)

          echo "Found linked issues: $ISSUE_NUMBERS"

          if [ -n "$ISSUE_NUMBERS" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "## Linked issues" >> "$GITHUB_STEP_SUMMARY"
            echo "| Issue | Action |" >> "$GITHUB_STEP_SUMMARY"
            echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
            while IFS= read -r issue_num; do
              [ -z "$issue_num" ] && continue

              echo "Commenting on linked issue #${issue_num}"
              gh issue comment "$issue_num" \
                --repo "$REPO" \
                --body "$COMMENT_BODY"

              echo "Closing linked issue #${issue_num}"
              gh issue close "$issue_num" \
                --repo "$REPO" \
                --comment "$COMMENT_BODY"

              echo "| #${issue_num} | commented + closed ✅ |" >> "$GITHUB_STEP_SUMMARY"
            done <<< "$ISSUE_NUMBERS"
          else
            echo "No linked issues found for PR #${PR_NUMBER}"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "_No linked issues found to close._" >> "$GITHUB_STEP_SUMMARY"
          fi
