name: ⇈ Update Issue Templates
description: Generate issue templates from CSV/Python definitions

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - '.github/GEN_ISSUE_TEMPLATE/**'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'

jobs:
  update_templates:
    runs-on: ubuntu-latest
    steps:
      - name: Install CMIPLD
        uses: WCRP-CMIP/CMIPLD/actions/cmipld@main

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate templates
        continue-on-error: true
        env:
          CMIPLD_TIMEOUT: 30
          LDR_TIMEOUT: 30
        run: |
          echo "Generating issue templates..."
          
          # Start LDR server with better wait
          echo "Starting LDR server..."
          ldr server start &
          SERVER_PID=$!
          
          # Wait for server to be ready with health check
          echo "Waiting for LDR server to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:3333/health >/dev/null 2>&1; then
              echo "✅ LDR server is ready"
              break
            fi
            echo "  Attempt $i/30 - server not ready yet, waiting..."
            sleep 2
          done
          
          # Run template generator with increased timeout
          echo "Running template generator (timeout: 30s)..."
          template_generate --timeout 30 || template_generate

          echo "Updating modification links..."
          template_update || echo "template_update not available"

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          add: '.github/'
          author_name: 'cmip-ipo'
          author_email: 'actions@wcrp-cmip.org'
          message: 'Auto-update issue templates'
          push: true

