name: ↻ Sync Workflows
description: Sync shared workflows and files from src-data to other branches

permissions:
  contents: write

on:
  push:
    branches:
      - src-data
    paths:
      - '.github/workflows/**'

      - '.github/prepublish/**'

      - '.github/CONTRIBUTING.md'
      - '.github/copilot-instructions.md'
  workflow_dispatch:

env:
  SYNC_FOLDERS: "prepublish"
  SYNC_FILES: "CONTRIBUTING.md copilot-instructions.md"

jobs:
  sync:
    runs-on: ubuntu-latest
    concurrency:
      group: branch-write-${{ matrix.branch }}
      cancel-in-progress: true
    strategy:
      matrix:
        branch:

          - src-data

          - docs


    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
          fetch-depth: 0

      - name: Fetch src-data branch
        run: git fetch origin src-data --depth=1

      - name: Replace .github/workflows from src-data
        run: |
          echo "Replacing .github/workflows on ${{ matrix.branch }} with src-data..."
          rm -rf .github/workflows
          mkdir -p .github/workflows
          git checkout origin/src-data -- ".github/workflows/"
          echo "Workflows replaced."

      - name: Sync other folders from src-data
        run: |
          for folder in $SYNC_FOLDERS; do
            echo "Syncing folder: .github/$folder"
            mkdir -p ".github/$folder"
            if git ls-tree -r origin/src-data --name-only | grep -q "^.github/$folder/"; then
              git checkout origin/src-data -- ".github/$folder/" 2>/dev/null || \
                echo "  Folder .github/$folder not found on src-data"
            else
              echo "  Folder .github/$folder not found on src-data"
            fi
          done

      - name: Sync files from src-data
        run: |
          for file in $SYNC_FILES; do
            echo "Syncing file: .github/$file"
            if git cat-file -e "origin/src-data:.github/$file" 2>/dev/null; then
              git checkout origin/src-data -- ".github/$file"
            else
              echo "  File .github/$file not found on src-data"
            fi
          done

      - name: Commit and push changes
        uses: EndBug/add-and-commit@v9
        with:
          add: '.github/'
          author_name: 'cmip-ipo'
          author_email: 'actions@wcrp-cmip.org'
          message: 'Sync .github files from src-data'
          push: true
