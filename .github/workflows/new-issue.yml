name: ⟳ New Issue Processing

# Initial run name set at workflow start. Format: Issue<num> (event)
#
# We don't put labels here because GitHub Actions expressions cannot filter
# arrays — we'd have to include every label including noisy bot ones like
# pull_req, needs-review, changes-requested. The status-marker job at the
# end of the workflow uses outputs from a bash filter step to produce a
# cleaner name like "Issue332_horizontal_grid_cell ; PR333".
run-name: >-
  Issue${{ github.event.issue.number || inputs.issue_number }}
  ${{
    github.event_name == 'workflow_dispatch' && '(manual)' ||
    github.event.action == 'edited' && '(edit)' ||
    '(new)'
  }}

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: string

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  process-issue:
    name: Issue${{ github.event.issue.number || inputs.issue_number }} processing
    runs-on: ubuntu-latest
    outputs:
      pr_number:       ${{ steps.find_pr.outputs.pr_number }}
      validation:      ${{ steps.run_issue.outputs.validation }}
      labels_filtered: ${{ steps.filter_labels.outputs.filtered }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # ── Filter labels for use in the status-marker job name ─────────────
      # Keep only labels that contain '_' (the typed CV labels like
      # horizontal_grid_cell, model_component, etc.) and explicitly drop
      # 'pull_req'. This strips noisy bot/state labels (Review, needs-review,
      # changes-requested, changes-made, emd-submission, approved, ...) so
      # the run shows just the data-type label that matters at a glance.
      - name: Filter labels
        id: filter_labels
        env:
          LABELS_JSON: ${{ toJSON(github.event.issue.labels.*.name) }}
        run: |
          FILTERED=$(printf '%s' "${LABELS_JSON:-[]}" | python3 -c "
          import json, sys
          try:
              labels = json.load(sys.stdin) or []
          except json.JSONDecodeError:
              labels = []
          kept = [l for l in labels if '_' in l and l != 'pull_req']
          print('|'.join(kept))
          ")
          echo "filtered=$FILTERED" >> "$GITHUB_OUTPUT"
          echo "Filtered labels: '$FILTERED'"
        shell: bash

      - name: Install CMIPLD
        uses: WCRP-CMIP/CMIPLD/actions/cmipld@main

      - name: Configure Git
        run: git config --global push.default simple
        shell: bash

      - name: Process issue
        id: run_issue
        env:
          ISSUE_NUMBER:      ${{ github.event.inputs.issue_number || github.event.issue.number }}
          ISSUE_SUBMITTER:   ${{ github.event.issue.user.login }}
          ISSUE_CREATED_AT:  ${{ github.event.issue.created_at }}
          GH_TOKEN:          ${{ secrets.CMIP_IPO_BOT_TOKEN || github.token }}
          GITHUB_TOKEN:      ${{ secrets.CMIP_IPO_BOT_TOKEN || github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          cd $GITHUB_WORKSPACE

          # Populate a temp dir with src-data so the LDR server serves
          # the live graph files rather than the main-branch stubs.
          LDR_DATA=$(mktemp -d)
          git fetch origin src-data
          git --work-tree="$LDR_DATA" checkout origin/src-data -- .

          # ldr server start already daemonizes itself — do not add &
          ldr server stop 2>/dev/null || true
          cd "$LDR_DATA"
          ldr server start
          cd "$GITHUB_WORKSPACE"

          # Wait until port 3333 accepts TCP connections.
          # Uses bash built-in /dev/tcp — no nc or curl needed.
          echo "Waiting for LDR server on port 3333..."
          for i in $(seq 1 30); do
            if timeout 1 bash -c 'cat < /dev/null > /dev/tcp/localhost/3333' 2>/dev/null; then
              echo "LDR server ready (attempt $i)"
              break
            fi
            sleep 1
          done

          if ! timeout 1 bash -c 'cat < /dev/null > /dev/tcp/localhost/3333' 2>/dev/null; then
            echo "ERROR: LDR server did not start within 30 s"
            exit 1
          fi

          # Run new_issue and capture exit status. Validation failure exits with 1
          # (sys.exit(1) in new_issue.py STEP 2). Any other failure also exits non-zero.
          # We record the validation outcome so the status-marker job can rename the run.
          set +e
          new_issue --issue $ISSUE_NUMBER
          RC=$?
          set -e
          if [ $RC -eq 0 ]; then
            echo "validation=pass" >> "$GITHUB_OUTPUT"
          else
            echo "validation=fail" >> "$GITHUB_OUTPUT"
            exit $RC
          fi
        shell: bash

      - name: Find PR for this issue
        id: find_pr
        env:
          GH_TOKEN:     ${{ secrets.CMIP_IPO_BOT_TOKEN || github.token }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number || github.event.issue.number }}
          REPO:         ${{ github.repository }}
        run: |
          # Retry for up to 8s — newly created PRs take a moment to index.
          # Build the regex pattern in a bash variable first; the previous version
          # had nested unescaped quotes inside --jq, so bash treated the regex's
          # literal "|" as a shell pipe and truncated the expression at the first |.
          PATTERN="_${ISSUE_NUMBER}_|[-_]${ISSUE_NUMBER}\$"

          PR_NUMBER=""
          for attempt in $(seq 1 4); do
            PR_NUMBER=$(gh pr list --repo "$REPO" --state open \
              --limit 200 \
              --json number,headRefName \
              --jq "[.[] | select(.headRefName | test(\"$PATTERN\"))] | .[0].number" \
              2>/dev/null || true)
            if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
              break
            fi
            echo "Attempt $attempt/4: PR not visible yet, retrying in 2s..."
            sleep 2
          done

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "No open PR found for issue #${ISSUE_NUMBER}."
            echo "pr_number=" >> "$GITHUB_OUTPUT"
          else
            echo "Found PR #${PR_NUMBER}"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            PR_URL=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json url --jq '.url')
            echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Add PR to project board
        if: steps.find_pr.outputs.pr_number != ''
        continue-on-error: true
        env:
          GH_TOKEN:   ${{ secrets.CMIP_IPO_BOT_TOKEN || github.token }}
          PR_URL:     ${{ steps.find_pr.outputs.pr_url }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          gh project item-add 8 --owner "$REPO_OWNER" --url "$PR_URL" \
            && echo "-> PR linked to project #8" >> "$GITHUB_STEP_SUMMARY" \
            || echo "! Could not add PR to project #8 (check project number, owner, and token 'project' scope)" >> "$GITHUB_STEP_SUMMARY"
        shell: bash

      - name: Check for duplicate grid content
        if: steps.find_pr.outputs.pr_number != ''
        uses: WCRP-CMIP/CMIPLD/actions/check-tempgrid-duplicate@main
        with:
          pr_number: ${{ steps.find_pr.outputs.pr_number }}
          gh_token:  ${{ secrets.CMIP_IPO_BOT_TOKEN || github.token }}

      # ── If issue is being updated and PR has changes-requested, add changes-made
      - name: Add changes-made label if changes-requested exists
        if: >
          steps.find_pr.outputs.pr_number != '' &&
          github.event.action == 'edited'
        env:
          GH_TOKEN:     ${{ secrets.CMIP_IPO_BOT_TOKEN || github.token }}
          REPO:         ${{ github.repository }}
          PR_NUMBER:    ${{ steps.find_pr.outputs.pr_number }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number || github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          EDITOR:       ${{ github.event.sender.login }}
        run: |
          # Only act when the person editing is the issue author (the submitter)
          # — avoids false positives from bots or admins editing issue metadata
          if [ "$EDITOR" != "$ISSUE_AUTHOR" ]; then
            echo "Editor ($EDITOR) is not the issue author ($ISSUE_AUTHOR) — skipping."
            exit 0
          fi

          # Check whether the PR currently carries the changes-requested label
          HAS_CR=$(gh pr view "$PR_NUMBER" --repo "$REPO" \
            --json labels --jq '[.labels[].name] | any(. == "changes-requested")' \
            2>/dev/null || echo 'false')

          if [ "$HAS_CR" != "true" ]; then
            echo "No changes-requested label on PR #${PR_NUMBER} — skipping."
            exit 0
          fi

          gh label create "changes-made" --repo "$REPO" \
            --color "5319e7" \
            --description "Submitter has made changes in response to review" \
            --force 2>/dev/null || true

          gh pr    edit "$PR_NUMBER"    --repo "$REPO" --add-label "changes-made" || true
          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --add-label "changes-made" || true

          echo "Added changes-made to PR #${PR_NUMBER} and issue #${ISSUE_NUMBER}" \
            >> "$GITHUB_STEP_SUMMARY"

  # ── Status marker — visible in the Actions UI with the final outcome ────────
  # The job's display NAME is evaluated AFTER process-issue produces its outputs,
  # so it can include both the filtered-labels output AND the validation result:
  #   "Issue332_horizontal_grid_cell ; PR333"   — passed, PR exists
  #   "Issue332_horizontal_grid_cell ValidationFail"   — failed
  # Labels are filtered by the filter_labels step in process-issue: kept only if
  # they contain '_' (the typed CV labels) and exclude 'pull_req'.
  status-marker:
    needs: process-issue
    if: always()
    runs-on: ubuntu-latest
    name: >-
      ${{
        needs.process-issue.result == 'success' && needs.process-issue.outputs.pr_number != ''
          && format('Issue{0}_{1} ; PR{2}',
                    github.event.issue.number || inputs.issue_number,
                    needs.process-issue.outputs.labels_filtered,
                    needs.process-issue.outputs.pr_number)
        || needs.process-issue.result == 'success'
          && format('Issue{0}_{1} ; (no PR)',
                    github.event.issue.number || inputs.issue_number,
                    needs.process-issue.outputs.labels_filtered)
        || format('Issue{0}_{1} ValidationFail',
                  github.event.issue.number || inputs.issue_number,
                  needs.process-issue.outputs.labels_filtered)
      }}
    steps:
      - name: Record outcome in summary
        run: |
          ISSUE_NUM="${{ github.event.issue.number || inputs.issue_number }}"
          LABELS="${{ needs.process-issue.outputs.labels_filtered }}"
          # If labels_filtered is empty (e.g. workflow_dispatch with no issue
          # context, or an issue with no _-bearing labels), drop the trailing
          # underscore so the tag reads "Issue332" not "Issue332_".
          if [ -n "$LABELS" ]; then
            ISSUE_TAG="Issue${ISSUE_NUM}_${LABELS}"
          else
            ISSUE_TAG="Issue${ISSUE_NUM}"
          fi
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          ISSUE_URL="${REPO_URL}/issues/${ISSUE_NUM}"

          {
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| **Issue**  | [#${ISSUE_NUM}](${ISSUE_URL}) |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ needs.process-issue.result }}" = "success" ]; then
            PR="${{ needs.process-issue.outputs.pr_number }}"
            if [ -n "$PR" ]; then
              PR_URL="${REPO_URL}/pull/${PR}"
              {
                echo "| **PR**     | [#${PR}](${PR_URL}) |"
                echo "| **Status** | ✅ Validation passed — PR created/updated |"
                echo ""
                echo "## ✅ ${ISSUE_TAG} ; PR${PR}"
                echo ""
                echo "Pull request [#${PR}](${PR_URL}) is ready for review."
              } >> "$GITHUB_STEP_SUMMARY"
            else
              {
                echo "| **PR**     | _none_ |"
                echo "| **Status** | ⚠️ Validation passed — no PR created |"
                echo ""
                echo "## ⚠️ ${ISSUE_TAG} ; (no PR)"
                echo ""
                echo "Validation passed, but the handler did not produce a writable file."
                echo "Common causes: missing required IDs, dry-run / validate-only mode, or no file changes."
                echo "See the issue for handler-specific errors."
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            {
              echo "| **PR**     | _frozen / not updated_ |"
              echo "| **Status** | ❌ Validation failed |"
              echo ""
              echo "## ❌ ${ISSUE_TAG} ValidationFail"
              echo ""
              echo "Validation failed — see the comment on [issue #${ISSUE_NUM}](${ISSUE_URL}) for the field-level errors."
              echo "No PR was created or updated. The submitter must edit the issue to correct the errors."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
        shell: bash
