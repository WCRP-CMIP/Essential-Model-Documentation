name: New Issue Processing

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: string

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  process-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -q \
            git+https://github.com/WCRP-CMIP/CMIPLD.git \
            git+https://github.com/wolfiex/jsonld-recursive \
            esgvoc
          npm install -g jsonld-recursive
        shell: bash

      - name: Configure Git
        run: git config --global push.default simple
        shell: bash

      - name: Process issue
        env:
          ISSUE_NUMBER:     ${{ github.event.inputs.issue_number || github.event.issue.number }}
          ISSUE_SUBMITTER:  ${{ github.event.issue.user.login }}
          ISSUE_CREATED_AT: ${{ github.event.issue.created_at }}
          GH_TOKEN:         ${{ github.token }}
          GITHUB_TOKEN:     ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          new_issue --issue $ISSUE_NUMBER
        shell: bash
