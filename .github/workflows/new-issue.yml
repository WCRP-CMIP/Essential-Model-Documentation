name: New Issue Processing

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: string

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  process-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install CMIPLD
        uses: WCRP-CMIP/CMIPLD/actions/cmipld@main

      - name: Configure Git
        run: git config --global push.default simple
        shell: bash

      - name: Process issue
        env:
          ISSUE_NUMBER:     ${{ github.event.inputs.issue_number || github.event.issue.number }}
          ISSUE_SUBMITTER:  ${{ github.event.issue.user.login }}
          ISSUE_CREATED_AT: ${{ github.event.issue.created_at }}
          GH_TOKEN:         ${{ secrets.CMIP_IPO_BOT_TOKEN || github.token }}
          GITHUB_TOKEN:     ${{ secrets.CMIP_IPO_BOT_TOKEN || github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          cd $GITHUB_WORKSPACE

          # ldr server must serve src-data graph files (not main branch).
          # Fetch src-data content into a temp dir, start the server from
          # there, then return to GITHUB_WORKSPACE for the new_issue run.
          LDR_DATA=$(mktemp -d)
          git fetch origin src-data
          git --work-tree="$LDR_DATA" checkout origin/src-data -- .
          ldr server stop 2>/dev/null || true
          cd "$LDR_DATA" && ldr server start && cd $GITHUB_WORKSPACE

          new_issue --issue $ISSUE_NUMBER
        shell: bash

      - name: Request Copilot review on new PR
        env:
          GH_TOKEN: ${{ secrets.CMIP_IPO_BOT_TOKEN || github.token }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number || github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          # Find the PR associated with this issue (branch name contains issue number)
          PR_NUMBER=$(gh pr list --repo "$REPO" --state open --json number,headRefName \
            --jq "[.[] | select(.headRefName | test(\"_${ISSUE_NUMBER}_|[-_]${ISSUE_NUMBER}$\"))] | .[0].number" \
            2>/dev/null || true)

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "No open PR found for issue #${ISSUE_NUMBER} — skipping Copilot review request."
            exit 0
          fi

          echo "Requesting Copilot review on PR #${PR_NUMBER}..."
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-reviewer "copilot" 2>/dev/null \
            && echo "✅ Copilot review requested on PR #${PR_NUMBER}" \
            || echo "⚠ Could not add Copilot reviewer (may not be enabled on this repo)"
        shell: bash
