name: New Issue Processing

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: string

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:

  # ── Job 1: Validate on main ─────────────────────────────────────────────────
  # Checks out main, fetches handler scripts and guidance, runs pycmipld +
  # custom validation. Posts warnings (with field guidance) to the issue on
  # failure. Sets output `passed` for the write job to gate on.
  validate:
    runs-on: ubuntu-latest
    outputs:
      passed:       ${{ steps.validate.outputs.passed }}
      issue_number: ${{ steps.issue-num.outputs.issue_number }}

    steps:
      - name: Determine issue number
        id: issue-num
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE_NUM="${{ github.event.inputs.issue_number }}"
          else
            ISSUE_NUM="${{ github.event.issue.number }}"
          fi
          echo "issue_number=$ISSUE_NUM" >> $GITHUB_OUTPUT
          echo "Processing issue #$ISSUE_NUM"
        shell: bash

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Install CMIPLD
        uses: WCRP-CMIP/CMIPLD/actions/cmipld@main

      - name: Install CMIP-LD (EMD fork with validation improvements)
        run: pip install git+https://github.com/WCRP-CMIP/CMIP-LD.git@main -q
        shell: bash

      - name: Run validation
        id: validate
        env:
          ISSUE_NUMBER:      ${{ steps.issue-num.outputs.issue_number }}
          GH_TOKEN:          ${{ github.token }}
          GITHUB_TOKEN:      ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PYTHONIOENCODING:  utf-8
          LC_ALL:            C.UTF-8
          LANG:              C.UTF-8
        run: |
          # --validate-only: runs pycmipld + custom checks, posts warnings to
          # the issue if anything fails, exits 0 on pass / 1 on fail.
          # No files are written. No branch or PR is created.
          if new_issue --issue ${{ steps.issue-num.outputs.issue_number }} --validate-only; then
            echo "passed=true"  >> $GITHUB_OUTPUT
          else
            echo "passed=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

  # ── Job 2: Write on src-data ────────────────────────────────────────────────
  # Only runs when validate passed. Checks out src-data, fetches handler
  # scripts, writes files, creates branch + PR, posts data JSON + review
  # report to the PR, updates the issue comment.
  write:
    needs: validate
    if: needs.validate.outputs.passed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout src-data branch
        uses: actions/checkout@v4
        with:
          ref: src-data
          fetch-depth: 0

      - name: Fetch handler scripts and guidance from main
        run: |
          git fetch origin main
          git checkout origin/main -- .github/ISSUE_SCRIPT
          git checkout origin/main -- .github/GEN_ISSUE_TEMPLATE
          echo "✓ Fetched handler scripts and field guidance from main"
        shell: bash

      - name: Install CMIPLD
        uses: WCRP-CMIP/CMIPLD/actions/cmipld@main

      - name: Install CMIP-LD (EMD fork with validation improvements)
        run: pip install git+https://github.com/WCRP-CMIP/CMIP-LD.git@main -q
        shell: bash

      - name: Configure Git
        run: git config --global push.default simple
        shell: bash

      - name: Write files, create branch and PR
        env:
          ISSUE_NUMBER:      ${{ needs.validate.outputs.issue_number }}
          GH_TOKEN:          ${{ github.token }}
          GITHUB_TOKEN:      ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PYTHONIOENCODING:  utf-8
          LC_ALL:            C.UTF-8
          LANG:              C.UTF-8
        run: |
          new_issue --issue ${{ needs.validate.outputs.issue_number }}
        shell: bash
